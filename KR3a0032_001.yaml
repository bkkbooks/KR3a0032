body:
  text: 二程粹言卷上宋楊時編論道篇子曰道外無物物外無道在父子則親在君臣則敬有適有莫於道已為有間又况夫清净而棄人倫者乎子曰立言所以明道也言之而知德者厭之不知德者惑之何也由涉道不深素無涵蓄爾子曰傳道為難續之亦不易有一字之差則失其本旨矣或謂惟太虛為虛子曰無非理也惟理為實或曰莫大於太虛曰有形則有小大太虛何小大之可言子曰有者不可謂之無猶人知識聞見歷數十年之後一旦念之昭昭然於心謂之無者非也謂之有者果安在哉或問誠者專意之謂乎子曰誠者實理也專意何足以盡之吕大臨曰信哉實有是理故實有是物實有是物故實有是用實有是用故實有是心實有是心故實有是事故曰誠者實理也或問介甫有言盡人道謂之仁盡天道謂之聖子曰言乎一事必分為二介甫之學也道一也未有盡人而不盡天者也以天人為二非道也子雲謂通天地而不通人曰伎亦猶是也或曰乾天道也坤地道也論其體則天尊地卑其道則無二也豈有通天地而不通人如止云通天文地理雖不能之何害為儒子曰上天之載無聲無臭之可聞其體則謂之易其理則謂之道其命于人則謂之性其用無窮則謂之神一而已矣子曰陰之道非必小人也其害陽則小人也其助陽成物則君子也利非不善也其害義則不善也其和義則非不善也子曰誠則無不敬未至於誠則敬然後誠子曰誠無不動者修身則身正治事則事理臨人則人化無往而不得志之正也或問子所定昏禮有壻往謝之儀何謂也子曰是時也以今視古氣之淳漓不同矣今人之壽夭貌象與古亦異而冕服爼豆未必可稱也聖人之主化猶禹之治水耳宜順之而不逆宜遵之而不違隨時之義亦因以此焉子曰天下之害皆以逺本而未勝也峻宇雕墻本於宫室酒池肉林本於飲食淫酷殘忍本於刑罰窮兵黷武本於征伐先王制其本者天理也後王流於末者人欲也損人欲以復天理聖人之教也或曰然則未可盡去乎曰本末一道也父子主恩必有嚴順之禮君臣主敬必有承接之儀禮遜有節非威儀則不行尊卑有序非物采則無别文之與質相須而不可缺也及夫末勝而本喪則寧逺浮華而質朴之為貴爾子曰純於敬則已與理一無可克者無可復者子曰質必有文自然之理也理必有對生生之本也有上則有下有此則有彼有質則有文一不獨立二必為文非知道者孰能識之子曰佛者之學若有止則有用子曰觀生理可以知道子曰至誠感通之道惟知道者識之子曰仁道難名惟公近之非指公為仁也子曰聖人以生死為常事無可懼者佛者之學本於畏死故言之不已下愚之人故易以其說自恐至於學禪雖異於是然終歸於此蓋皆利心也或曰本以利心得之耶抑以利心求之而有失也子曰本以利心得之故學者亦以利心失之也莊生所謂無常化者亦若是爾韓侍郎曰道無真假子曰既無真則是假爾既無假則是真矣真假皆無尚何有哉必曰是者為真非者為假不亦顯然而易明乎子謂門人曰於佛氏之說不必窮也苟欲窮之而未能窮則已與之俱化矣曰然則何以能不疑曰曷不以其迹考之其迹如是其心何如哉豈可取其迹而不求其心探其心而不考其迹也心迹猶形影無可判之理王仲淹之言非也助佛氏之說者必曰不當以其迹觀之吾不信也子曰義利云者公與私之異也較計之心一萌斯為利矣子曰便儇佼厲之人去道逺而子曰公者仁之理恕者仁之施愛者仁之用子厚曰誠一物也子曰苟非至誠雖建功立業亦出於事為浮氣其能久乎或問學者多流於釋氏之說何也子曰不致知也知之既至孰得而移之知玉之為寶則人不能以石亂之矣知醴之為甘則人不能以蘖亂之矣知聖人之為大中至正則釋氏不能以說惑之矣或謂佛氏所謂定豈聖人所謂止乎子曰定則忘物而無所為也止則物自付物各得其所而我無與也子曰天地不相遇則萬物不生君臣不相遇則政治不興聖賢不相遇則道德不亨事物不相遇則功用不成遇之道大矣哉子曰至公無私大同無我雖眇然一身在天地之間而與天地無以異也夫何疑焉佛者厭苦塵根是則自利而已子曰能明善斯可謂明也已能守善斯可謂誠也已或問孝弟為仁之本與子曰行仁自孝弟始孝弟仁之事也仁性也孝弟用也謂孝弟為行仁之本則可直曰仁之本則不可或問仁與聖何以異子曰仁可以通上下而言聖名其極也有人於此一言一行仁矣亦可謂之仁而不可謂之聖至於盡人道者必謂之聖而亦可謂之仁子曰仁者天下之正理失正理則無序而不和或問敬子曰主一之謂敬何謂一子曰無適之謂一何以能見一而主之子曰齊莊整敕其心存焉涵飬純熟其理著矣子曰忠恕猶曰中庸不可偏舉子曰至誠事親則成人子至誠事君則成人臣無不誠者故曰誠者自成也或問中庸可擇乎子曰既博學之又審問之又謹思之又明辨之所以識中庸之理而不差忒奚為而不擇子曰存道者心無老少之異行道者身老則衰故孔子曰吾衰也久矣子曰仁者必愛指愛為仁則不可不仁者無所知覺指知覺為仁則不可子曰可欲莫如善以有諸巳為貴若存若忘焉而不為物所誘俗所移者吾未之見也子曰敬以直內義以方外仁也不可曰以敬直內以義方外謂之敬義者猶曰行仁義云耳何直之有所謂直也者必有事而勿正是也敬以直內義以方外與物同矣故曰敬義立而德不孤推而放諸四海而凖子曰守道當確然而不變得正則逺邪就非則違是無兩從之理子謂學者曰夫道恢然而廣大淵然而深奧於何所用其力乎惟立誠然後有可居之地無忠信則無物子曰理素定則能見幾而作不明於理何幾之能見或問四端不言信何也子曰有不信故言有信譬之四方其位已定何不信之有若以東為西以南為北斯不信矣是故四端不言信劉安節問仁與心何異子曰於所主曰心名其德曰仁曰謂仁者心之用乎子曰不可曰然則猶五榖之種待陽氣而生乎子曰陽氣所發猶之情也心猶種焉其生之德是為仁也子曰敬則無間斷文王之純如此子曰禮者人之規範守禮所以立身也安禮而和樂斯為盛德矣子曰無道而得富貴其為可恥人皆知之而不處焉惟特立者能之子曰子厚以清虛一大名天道是以器言非形而上者子曰今之語道者語高則遺卑語本則遺末孟子之書雖所記不主一端然無精粗之分通貫言之蔑不盡者子曰凡志於求道者可謂誠心矣欲速助長而不中理反不誠矣故求道而有迫切之心雖得之必失之觀天地之化一息不留疑於速也然寒暑之變極微曷嘗遽哉子曰語默猶晝夜爾死生猶古今爾子曰仁則一不仁則二子曰一德立而百善從之子曰無一亦無三故曰三人行則損一人一人行則得其友是二而已子曰天以生為道或問理義何以異子曰在物為理處物為義子曰形而上者存於灑掃應對之間理無小大故也子曰理有盛衰有消長有盈益有虛損順之則吉逆之則凶君子隨時所尚所以事天也子曰理善莫過於中中則無不正者而正未必得中也或問仁子曰聖賢言仁多矣㑹觀而體認之其必有見矣韓文公曰博愛之謂仁愛情也仁性也仁者固博愛以博愛為盡仁則不可或問何謂忠何謂恕子曰維天之命於穆不已忠也天地變化草木蕃恕也子曰不偏之謂中一物之不該一事之不為一息之不存非中也以中無偏故也此道也常而不可易故既曰中又曰庸也或問商丘開之事信乎子曰大道不明於天下莊列之徒窺測而言之者也或曰蹈水火白刃而無傷巫師亦或能之豈在誠乎子曰彼以邪心詭道為之常懷欺人之意何誠之有曰然則其能者何也子曰西方有幻術焉凡其所謂變化神通以駭衆人之耳目者皆幻也巫師所能乃其餘緒耳子曰異端之說雖小道必有可觀也然其流必害故不可以一言之中一事之善而兼取其大體也夫楊墨亦是堯舜而非桀紂其是非豈不當乎其所以是非之意蓋竊吾之似欲成其說耳子曰介甫之言道以文焉耳矣言道如此已則不能然是已與道二也夫有道者不矜於文學之門啓口容聲皆至德也子曰世之學者未嘗知權之義於理所不可則曰姑從權是以權為變詐之術而已也夫臨事之際稱輕重而處之以合於義是之謂權豈拂經之道哉或問信在四端猶土王四季乎子曰信無在無不在在易則至理也在孟子則配道義之氣也或問夫子曰有已發之中有未發之中中有二耶子曰非也發而中節亦是中也對中而言之則謂之和可也以其發故也子謂子厚曰道者天下之公也而學者欲立私說何也子厚曰心不廣也子曰彼亦是美事好而為之不知乃所當為強私之也子曰因人情而節文之者禮也行之而人情宜之者義也或問喜怒哀樂未發之時耳無所聞目無所見乎曰雖無聞見而聞見之理自存汝於靜也何如對曰謂之有物則不可然昭昭乎有所知覺也子曰有是覺則是動矣曰夫子於喜怒哀樂之未發也謂靜而已乎子曰汝必從事於敬以直內則知而得之矣曰何以未發言中子曰敬而無失所以中也凡事事物物皆有自然之中若俟人為布置則不中矣子曰或言方有內外是有間矣道無間方無內外或問何謂時中子曰猶之過門不入在禹稷之世為中也時而居陋巷則過門不入非中矣居於陋巷在顔子之時為中也時而當過門不入則居於陋巷非中矣蓋以事言之有時而中以道言之何時而不中也或問外物宜惡諸子曰於道而無所見則纍與惡皆不得免焉蓋亦原其當有當無爾當有也何惡之有當無也何絶之有子曰理者禮也文也禮者實也本也文者華也末也理文若二而道一也文過則奢實過則儉奢自文至儉自實生形影之類也子曰昔聖人謂立人之道曰仁與義仁者人也親親為大唯能親親故自吾老幼以及人之老幼義者宜也尊賢為大唯能尊賢故賢者在位能者在職仁義盡人之道盡矣子曰視聽言動一於禮謂之仁子曰信不足以盡誠猶愛不足以盡仁也子曰晝夜者死生之道也知生之道則知死矣盡人之道則能事鬼矣死生人鬼一而二二而一者也子曰仕止久速惟其可不執於一故曰君子而時中也喜怒哀樂之未發寂然不動故曰天下之大本也子曰能盡飲食言語之道則能盡出處去就之道矣能盡出處去就之道則能盡死生之道矣其致一也子曰有形皆器也無形惟道子曰凡執守不定者皆不仁也子曰釋氏言定異乎聖人之言止夫於有美惡因而美惡之美惡在物我無心焉苟曰吾之定不預於物然物未嘗忘也聖人曰止隨其所止而止之止其所也子曰中無定方故不可執一今以四方之中為中則一方無中乎以中外之中為中則當外無中乎故自室而觀之有室之中而自堂觀之則室非中矣自堂而觀之有堂之中而自庭觀之則堂非中矣子曰集義生氣方其未養也氣自氣爾惟集義以生則氣與義合無非道也合非所以言氣自其未養言之也或問集義必於行事非行事則無所集矣子曰內外一事豈獨事欲合義也又問敬以直內其能不用意乎子曰其始安得不用意也久而成焉意忘矣又問必有事焉者其惟敬而已乎子曰敬以涵養也集義然後為有事也知敬而不知集義不幾於兀然無所為者乎子曰佛氏之道一務上達而無下學本末間斷非道也子曰楊墨之害甚於申韓佛氏之害甚於楊墨子曰論語所載其猶權衡尺度歟能以是揆事物者長短輕重較然自見矣子曰敬則虛靜而虛靜非敬也子曰一不敬則私欲萬端生焉害人此為大子曰仁者以天地萬物為一體莫非我也知其皆我何所不盡不能有諸已則其與天地萬物豈特相去千萬而已哉子曰仁孝之理備於西銘之言學者斯須不在是即與仁孝逺矣子曰無不敬者對越上帝之道也子曰順理則無憂子曰老子語道德而雜權詐本末舛矣申韓蘇張皆其流之弊也申韓原道德之意而為刑名後世猶或師之蘇張得權詐之說而為縱橫其失益逺矣今是以無傳焉或問釋氏有事事無礙譬如鏡燈包含萬象無有窮盡也此理有諸子曰佛氏善侈大其說也今一言以蔽之曰萬物一理耳夫百氏諸子未有不善道德仁義者考其歸宿則異乎聖人也佛氏其辭皆善遁今即其言而究之則必曰吾不為是也夫已出諸其口載之於書矣遁將何之子曰佛之所謂世網者聖人所謂秉彞也盡去其秉彝然後為道佛之所謂至教也而秉彞終不可得而去也耳聞目見飲食男女之欲喜怒哀樂之變皆其性之自然今其言曰必盡絶是然後得天真吾多見其喪天真矣學者戒之謹之至於自信然後彼不能亂矣或問愛何以非仁子曰愛出于情仁則性也仁者無偏照是必愛之子曰謙者治益之道子曰離陰陽則無道陰陽氣也形而下也道太虛也形而上也子曰道無體而義有方或問釋氏有言下覺何如子曰何必浮屠氏孟子言之矣以先知覺後知以先覺覺後覺知者知此事也覺者覺此理也或問變與化何别王氏謂因形移易謂之變離形頓革謂之化疑其說之善也子曰非也變未離其體也化則舊迹盡亡自然而已矣故曰動則變變則化惟天下至誠為能化子曰盡已無歉為忠體物無違為信表裏之義也子曰動靜無端陰陽無始非知道者孰能識之子曰莫大於道莫妙於神至大至妙宜若難言也聖人語之猶常事爾使學者玩而索之故其味長釋氏之言夸張閎侈將以駭人耳目而動其心意已盡而言未已故其味短子曰聖人公心盡天地萬物之理各當其分故其道平直而易行佛氏厭苦棄捨造作費力皆非自然故失之逺子曰佛氏求道猶以管窺天惟務上見而不燭四旁是以事至則不能變子曰中庸天理也不極天理之高明不足以道乎中庸中庸乃高明之極耳非二致也子曰豫奪翕張理所有也而老子之言非也與之之意乃在乎取之張之之意乃在乎翕之權詐之術也子曰禮樂大矣然於進退之間則已得性情之正子曰一二合而為三三見則一二亡矣離三而為一二一二見而三亡矣方為一二而求三既已成三又求一二是不知理子曰善惡皆天理謂之惡者或過或不及無非惡也楊墨之類是也子曰以氣明道氣亦形而下者耳子曰靜中有動動中有靜故曰動靜一源子曰氣充則理正正則不私不私之至則神或問何謂誠何謂道乎子曰自性言之為誠自理言之為道其實一也子曰中無定體惟達權然後能執之子曰至顯莫如理昔有人鼓琴而見螳螂捕蟬者或人聞之而曰琴胡為有殺聲也夫殺在物見在心而聽者以聲知之非至顯歟子曰道不逺人不可須臾離也此特為始學者言之耳論道之極無逺也無近也無可離不可離也子曰使萬物無一失所者斯天理中而已子曰人為不善於幽隱之中者謂人莫已知也而天理不可欺何顯如之或曰是猶楊震所謂四知者乎子曰幾矣雖然人我之知猶有分也天地則無二知也吕大臨曰中者道之所由出也子曰非也大臨曰所謂道也性也中也和也名雖不同混之則一歟子曰中即道也汝以道出於中是道之於中也又為一物矣在天曰命在人曰性循性曰道各有當也大本言其體達道言其用烏得混而一之乎大臨曰中即性也循性而行無非道者則由中而出莫非道也豈為性中又有中哉子曰性道可以合一而言中不可並性而一中也者狀性與道之言也猶稱天圓地方而不可謂方圓即天地方圓不可謂之天地則萬物非出於方圓矣中不可謂之道則道非出於中矣中之為義自過與不及而立名而指中為性可乎性不可容聲而論也率性之謂道則無不中也故稱中所以形容之也大臨曰喜怒哀樂之未發赤子之心至虛無倚豈非中乎此心所發無往而不中大人不失赤子之心所謂允執厥中也子曰赤子之心已發而未逺於中者也而爾指為中是不明大本也大臨曰聖人智周萬物赤子未有所知其心固不同也孟子所言特取其純一無僞可與聖人同爾非謂無毫髮之異也無過不及之謂中何從而知之乎求之此心而已此心之動出入無時何從而守之乎求之喜怒哀樂未發之際而已當是時也至虛不倚純一無僞以應萬物之變何往而非禮義哉故大臨以赤子之心為中而曰中者道之所由出也子曰非謂無毫髮之異斯異矣大本則無異爾於喜怒哀樂未發之際而求中之中去中不亦逺乎大臨曰然則夫子以赤子之心為已發者而未發之時謂之無心可乎子曰心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也在人所見何如耳論愈析微則愈易差失言之未瑩則亦擇之未精耳大臨曰此則淺陋之罪也敢不承教論學篇子曰識道以智為先入道以敬為本夫人測其心者茫茫然也將治心而不知其方者寇賊然也天下無一物非吾度內者故敬為學之大要子曰學必先知仁知之矣敬以存之而已存而不失者心本無懈何事於防間也義理益明何事於思索也斯道也與物無對大不足以名之天地之用即我之用也萬物之體即我之體也子曰行失即惡亦改之而已事失即亂亦治之而已苟非自棄皆君子也子曰犯而校者私巳也不校者樂天也或曰然則無當報者乎子曰其有報也亦循理而已子曰所處於貧賤雖貧賤未嘗不樂不然雖富貴亦常歉然不自得故曰莫大於理莫重於義子曰彈琴而心不在焉則不成聲故曰琴者禁邪心也蘇昞問修辭何以立誠子曰苟以修飾言語為心是僞而已子曰視聽言動無非天也知其正與妄斯善學矣子曰世俗之言多失正如吳楚失之輕趙魏失之重既通乎衆盡正之而不得則君子去其甚者而已子曰有過必改罪已是也改而已矣常有歉悔之意則反為心害子曰學者欲得正必以顔子為凖的蘇洵曰平居講習殆空言也何益不若治經傳道為居業之實耳子曰講習而無益蓋未嘗有得耳治經固學之事苟非自有所得則雖五經亦空言耳子曰射法具而彀不滿發不中未正內志耳子曰今之學者有三弊溺於文章牽於訓詁惑於異端苟無是三者則將安歸必趨於聖人之道矣或問有反身而未誠者何子曰是視身之與誠猶二物也必以已合彼非能誠矣夫身既不誠則無樂矣子謂劉安節曰善學者進德不有異於綴文者耶有德矣動無不利為無不成何有不文若綴文之士不專則不工專則志局於此又安能與天地同其大乎吕大臨有言學如元凱未免成癖文似相如未免類俳今之為文者一意於詞章藻繪之美以悅人之耳目非俳優而何子曰能守節善矣亦貴乎適中而已節而過中是謂苦節安能常且久耶子曰妄動由有欲妄動而得者其必妄動而失一失也其得之必失之二失也况有凶咎隨之乎是故妄得之福災亦隨焉妄得之得失亦繼焉苟或知此亦庶幾乎不由欲而動矣子曰於上深有所望於下深有所責其處已則莫不恕也而可乎子曰言行不足以動人臨事而倦且怠皆誠不至也子曰人之智思因神以發智短思敞神不㑹也㑹神必有道子曰古人謂心廣洪大無偏而不起之處得見其人亦可與語矣韓公與子坐惜日之暮喟然而嘆子曰常理也古猶今也而何歎曰老而將去也子曰勿去可也曰奈何而勿去子曰不能則去矣子曰斟酌古今而去取之非心有權度卓然不疑者未能無差忒子曰可觀莫如萬物之生意子曰處患難知其無可奈何遂放意而不反是安於義命者子曰知過而能改聞善而能用克己以從義其剛明者乎子曰饑而食渴而飲冬而裘夏而葛苟有一毫私意於其間即廢天職子曰學禮義考制度必求聖人之意得其意則可以㳂革矣或問入道之功子曰立志志立則有本譬之藝木由毫末拱把至於合抱而干雲者有本故也子曰學者有所聞而不著乎心不見乎行則其所聞固自他人之言耳於已何與焉子曰思索經義不能於簡䇿之外脫然有獨見資之何由深居之何由安非特誤巳亦且誤人也或問人有少而勇老而怯少而廉老而貪何為其然也子曰志不立為氣所使故也志勝氣則一定而不可變也曾子易簀之際其氣微可知也惟其志既堅定則雖死生之際亦不為之動也况老少之異乎或問人有日記萬言或妙絶技藝者是可學乎子曰不可才可勉而少進鈍者不可使利也惟積學明理既久而氣質變焉則暗者必明弱者必立矣或問為養而求仕不免憂得失將何以免此子曰志勝氣義處命則無憂矣曰在已可免也而親不悅奈何子曰為已為親非二事也其如命何人苟不知命見利必趨遇難必避得喪必動其異於小人者幾希聖人曰命云者為中人而設也上智之士惟義之安雖曰求而得之然安於義而無求此樂天者之事也至於聞有命而不能安之則每下矣或問為文有害於大學之道乎子曰是其為業也不專則不工也專則志局於此斯害也已學以養心奚以文為五經之言非聖人有意於文也至藴所發自然而成也或曰遊夏以文學稱何也曰汝謂其執簡秉筆從事於詞章之技乎子曰讀書將以窮理將以致用也今或滯心於章句之末則無所用也此學者之大患子曰利者衆之所同欲也專欲利已其害大矣貪之甚則昏蔽而忘理義求之極則爭奪而致怨子曰學者自治極於剛則守道愈固勇於進則遷善愈速子曰達理故樂天而不競內充故退遜而不矜子曰物聚而無以養之則不能存息矣故君子動靜節宣所以養生也飲食衣服所以養形也威儀行動所以養德也推已及物所以養人也養道之所貴惟正而已矣子曰言不可不謹傷於易則誕傷於煩則支已肆則物忤出悖則來違君子所以非法不道也子曰射中鵠舞中節御中度皆誠也子曰赴湯火蹈白刃武夫之勇可能也克己自勝非君子之大勇不可能也子曰凡人之過多矣能改之者猶無過也惟識趣汙下之人其改之為最難故其過最甚子曰始於致知智之事也行所知而極其至聖之事也子曰學者好為高論猶貧人談金辨其體色權其輕重商其貴賤其言未必非也然終不如富人之有金未嘗自言金之美也子曰進學莫先乎致知養心莫大乎理義王彥霖曰人之於善也必其誠心欲為然後有所得其不欲不可以強人也子曰是不然任其自為聽其不為則中人以下自棄自暴者衆矣聖人所以貴於立教也彥霖再問立德進德當何先子曰有既立而益進者上也有勇而至於立者次也或問必有事焉者其敬而已乎子曰敬所以涵養也集義所謂必有事也不知集義是為無事也曰義者中理之謂乎子曰中理見乎事敬在心義以方外然後中理矣曰義與敬何以異子曰敬所以持守也有是有非順理而行者義也曰敬猶靜歟子曰言靜則老氏之學也子曰處屯難之時而有致亨之道其惟正固乎凡處難能守正而不變者鮮矣子曰百工治器必貴於有用器而不可用工不為也學而無所用學將何為也子曰學而未有所知者譬猶人之方醉也亦何所不至及其既醒必惕然而恥矣醒而不以為恥末如之何也子謂周行已曰今之進學者如登山方於平易皆能濶步而進一遇峻險則止矣子曰根本既立然後可立趨向趨向既立矣而所造有深淺不同者勉與不勉故也子曰不誠則有纍誠則無纍子曰學之而不養養之而不存是空言也子曰重任必強脊膂之人乃能勝子曰義有至精理有至奧能自得之可謂善學矣子曰自得而至於無我者凡善言美行無非所過之化也子曰學至涵養其所得而至於樂則清明高逺矣子曰學而不自得則至老而益衰子曰力學而得之必充廣而行之不然者局局其守耳子曰語學者以其所未至不惟所聞不深亦易忽於理子曰見之既明養之既熟泰然而行之其進曷禦焉子曰識必見於行如行道塗涉暗阻非日月之光炬火之照則不可進矣故君子貴有識力學窮理則識益明照知不惑乃益敏矣子曰言而不行自欺孰甚焉子曰動以人則有妄動以天則無妄子曰教人者養其善心則惡自消治民者導以敬遜則爭自止子曰學必激昻自進不至於成德不敢安也或問今有志於學而知識蒙蔽力不能勝其任則如之何曰致知則明明則無不勝其任者在勉強而已子曰人之於學避其所難而姑為其易者斯自棄也已夫學者必志於大道以聖人自期而猶有不至者焉子曰以富貴驕人者固不美矣以學問驕人者其害豈小哉子曰學者當務實一有近名之心則大本已失尚何所學哉或曰不猶賢於為利者乎子曰清汚雖不齊而其利心則一也然則沒世而名不稱孔子何為而疾之也子曰非為求名也為無善之可稱耳或問日新者益進乎抑謂無弊而已乎子曰有進意而求益者必日新或曰有因苦學失心者何也子曰未之聞也善學者之於其心治其亂收其放明其蔽安其危曾謂為心害乎子曰不知天則於人之賢否愚知有所不知雖知之有所不盡故學以知天為本不知人則所親者或非其人所由者或非其道故學者以親賢為急子曰學不博者不能守約志不篤者不能力行或問學何如而謂之有得子曰其必默識心通乎篤誠明理而涵養之者次也聞之知之億度之舉非得也或問學必窮理物散萬殊何由而盡窮其理子曰誦詩書考古今察物情揆人事反覆研究而思索之求止於至善蓋非一端而已也又問泛然其何以㑹而通之子曰求一物而通萬殊雖顔子不敢謂能也夫亦積習既久則脫然自有該貫所以然者萬物一理故也子曰未有知之而不能行者謂知之而未能行是知之未至也子曰於所當為者用意而為之未免私心也子曰致知則智明智明然後能擇或問夫子之教必使學者涵養而後有所得何如其涵養也子曰莫如敬子曰學者以屏知見息思慮為道不失於絶聖棄智必流於坐禪入定夫鑑之至明則萬物畢照鑑之常也而奚為使之不照乎不能不與萬物接則有感必應知見不可屏而思慮不可息也欲無外誘之患惟內有主而後可主心者主敬也主敬者主一也不一則二三矣苟繫心於一事則他事無自入况於主敬乎或問致知力行其功並進乎子曰人謂非禮勿為則必強勉而從之至於言穿窬不可為不必強勉而後能也故知有淺深則行有逺近此進學之效也循理而至於樂則已與理一殆非強勉之可能也子曰間邪則誠已存非取誠於外納諸中而存之也故役役然於不善之中求善而為之必無入善之理子曰古之言知之非艱者吾謂知之亦未易也今有人欲之一地必知所出之門所由之道然後可往苟不知也雖有往赴之心其能進乎後世非無美質而力行者然鮮能明道蓋知之者難也或問使從俗可以從歟子曰於義有害者胡為而可從子曰學者苟有朝聞道夕死可矣之志則不肻安於所不安也不能然者不見實理故也或問何謂實理子曰灼然見其是非可否也古人有視死如歸者苟不見死重於義如見火之熱水之深無復疑則其能者未矣子曰獨處而靜思者非難居廣而應天下者為難朱光庭問為善之要子曰孜孜而為之者當其接物之際也未與物接則敬而已自敬而動所謂為善也子曰有志於道而學不加進者是無勇也伯淳與吳師禮論王氏所學之失其為我盡達之介甫理者天下之公不可私有也非敢必以為是介甫有以告我則願反覆辨之辨之而明不有益於彼斯有益於我矣子曰學者所見所期不可不逺且大也及夫施於用則必有其漸子曰責善之道必也貴誠而不貴言則於人有相長之益在巳無自辱之患子曰古之教人無一物不使之誠心射與舞之類是也子曰怒在理而無所遷動乎血氣則遷矣或謂舉子必精修其所業可以應有司之選今夫子每止之使勿習何也子曰設科以文詞取士苟可以應科則亦足矣盡心力而為之以期乎必得是惑也子曰古者家有孰黨有庠三老坐於里門察其長幼出入揖遜之序詠歌諷誦無非禮義之言今也上無所學而民風日以偷薄父子兄弟惟知以利相與耳今里巷之語不可以屬耳也以古所習如彼欲不善得乎以今所習如此欲其善得乎或問道不明於後世其所學者為何子曰教之者能知之學者之衆不患其不明也魯國一時賢者之衆非特天授由學致也聖人既沒曠千有餘歲求一人如顏閔不可得故教不立學不傳人材不期壞而自壞或問燕處倨肆心不怠慢有諸子曰無之入德必自敬始故容貌必恭也言語必謹也雖然優遊涵泳而養之可也拘迫則不能入矣子曰古所以成材之具今舉無矣惟出入於人心者猶在耳學者其可不勉乎子曰人多以子弟輕俊為可喜而不知其為可憂也有輕俊之質者必教以通經學使近本而不以文辭之末習則所以矯其偏質而復其德性也子曰凡人於事有少自快則其喜懌之意猶浹洽於心而發見於外况學而見理者乎雖然至於窮理而切切焉不得其所可悅者則亦何以養心也子曰古之人十五而學四十而仕其未仕也優遊養德無求進之心故其所學必至於有成後世之人自其為兒童從父兄之所教與其壯長追逐時習之所尚莫汲汲於勢利也善心何以不喪哉子曰學佛者於內外之道不備子曰博奕小技也不專心致志猶不可得况學聖人之道悠悠焉何能自得也孔子曰吾嘗終日不食終夜不寢以思無益不如學也又曰朝聞道夕死可矣夫聖人何為而迫切至於如是其極哉善學者當求其所以然之故不當誦其文過目而已也學如不及猶恐失之苟曰姑俟來日斯自棄也子曰昏於天理者嗜欲亂之耳子曰子厚以禮立教使學者有所據守也子曰學者於聖人無卓然之獨見則是聞人之言云耳因曰亦云耳而已子曰學不純則不得其所止中無止則不能不外求譬夫家有藏寶者豈復假人以為玩乎潘康仲問學者於聖人之門非願其有異也惟不能知之是以流於不同敢問持正之道子曰知之而後可守無所知則何所守也故學莫先乎致知窮理格物則知無不盡知之既盡則守無不固子曰古之君子修德而已德成而言則不期於文而自文矣退之固因學為文章力求其所未至以至於有得也其曰軻死不得其傳非卓然見其所傳者語不及此子曰蘇吕二子皆以知見聞見為學之患吾喜其近道必欲堅叩明其辨可與終其說矣夫人之學非自願其有差也知之不至則流别於殊塗陷溺於異端亦不得免焉耳子曰吕進伯老矣慮學問之不進憂年數之不足恐無所聞而遂死焉亦可謂之好學也子曰養勇之法求之太急故性氣輕軼而難御凡長育人材也教之在寬待之以久然後化成而俗美或問夫子有言昔之惑人因其迷暗今之惑人因其髙明竊有疑焉夫既曰髙明而可惑乎子曰語其質云爾彼深於佛氏之學者其質開透亦必加於人數等所謂智者過之也非中庸所謂極髙明者也聖人極髙明而道中庸其照無偏何過之有子厚曰十詩之作將以驗天心於語默也子曰舍是有言亦烏得已乎子謂子厚曰關中之士語學而及政論政而及禮樂兵刑之學庶幾善學者子厚曰如其誠然則志大不為名亦知學貴於有用也學古道以待今則後世之謬不必屑屑而難之舉而措之可也或問學者何習老莊之衆也子曰謹禮而不達者為其所膠固焉放情而不莊者畏法度之拘已也必資其放曠之說以自適其勢則然或問學者多溺於佛說何也子曰學而無所得其年齒老矣智力屈矣其心欲遽止焉則又不自安一聞超騰侈大之說是以說而入之然則可反乎子曰深固者亦難反嘗譬之行人履乎坦途其進無難也山髙乎其前水深乎其下而進之為難也於是焉而有捷徑則欣然而從之其勢然也夫托乎逆旅者蓋不得家居之要爾未有人既安於家而又樂舍於逆旅者也子曰林大節少戅然得一言即躬履學者可畏莫如聞斯行之聞而不行十蓋九矣子謂門人曰昨日之㑹談空寂者紛紛吾有所不能噫此風既成其何能救也古者釋氏盛時尚只是崇像設教其害小爾今之言者乃及乎性命道德謂佛為不可不學使明智之士先受其惑嗚呼清談盛晉室衰况有甚者乎夫明智之士中人以上之資也其才足以自立則反之難矣學者必至於自信而不惑則彼不能亂不然猶之淫言美色戒而逺之尚恐不免也侯仲良曰夫子在講筵必廣引博喻以曉人主一日講既退范堯夫揖曰美哉何記憶之富也子對曰以不記憶也若有心於記憶亦不能記矣或人有自名導氣養生者問子亦知之乎子曰吾夏葛而冬裘渴飲而饑食節嗜欲定心氣如此而已子曰學莫大於知本末終始致知格物所謂本也始也治天下國家所謂末也終也治天下國家必本諸身其身不正而能治天下國家者無之格猶窮也物猶理也若曰窮其理云爾窮理然後足以致知不窮則不能致也子曰格物適道之始思所以格物而已近道矣是何也以收其心而不放也子曰大學於誠意正心皆言其道至於格物則不言獨曰物格而後知至此蓋可以意得不可以言傳也自格物而充之然後可以至於聖人不知格物而欲意誠心正而後身修者未有能中於理者也子曰學莫貴乎自得非在人也子曰見攝生者而問長生可謂大愚見卜者而問吉凶可謂大惑子曰學貴乎成既成矣將以行之也學而不能成其業用而不能行其學則非學矣子曰君子莫進於學莫止於畫莫病於自足莫罪於自棄進而不止湯武所以反之而聖子曰古之學者為巳而成物今之學者為人而喪巳子曰無好學之志則雖聖人復出亦無益矣然聖人在上而民多善者習見之熟也習聞之久也涵泳其教化深且逺也子曰記問文章不足以為人師以其所學者外也師者何也謂理義也學者必求師從師不可不謹也子曰君子之學貴一一則明明則有功子曰不思故有惑不求故無得不問故莫知子曰進學不誠則學雜處事不誠則事敗自謀不誠則欺心而棄已與人不誠則喪德而增怨今末習曲藝亦必誠而後精况欲趨衆善為君子者乎子曰不深思則不能造其學或曰學者亦有無思而得者乎子曰漠然未嘗思自以為得之者未之有也子曰德盛者物不能擾而形不能病臨震懼死生而色不變當疾痛慘戚而心不動由養之有素非一朝一夕之力也子曰學不貴博貴於正而已正則博言不貴文貴於當而已當則文政不貴詳貴於順而已順則詳子曰學也者使人求於內也不求於內而求於外非聖人之學也何謂求於外以文為主者是也學也者使人求於本也不求於本而求於末非聖人之學也何謂求於末考詳略採同異是也二者無益於德君子弗之學也子曰自得者所守不變自信者所守不疑子曰隨時觀理而天下之理得矣子曰人皆可以為聖人而君子之學必至聖人而後已不至聖人而自己者皆自棄也孝者所當孝弟者所當弟自是而推之是亦聖人而已矣子曰學以不欺暗室為始子曰多聞識者猶廣儲藥物也知所用為貴子曰講說非古也學者必潛心積慮涵養而自得之今一日盡講是以博為教非有益也子曰學而為名內不足也子曰行踐其言而人不信者有矣未有不踐言而人信之者子曰恥不知而不問終於不知而已以為不知而必求之終能知之矣子曰有辨佞之才者多入於不善故學不貴子曰有欲則不剛剛者不屈於欲子曰克己之私既盡一歸於禮此之謂得其本心子曰學貴於通執一而不通將不勝其疑矣通莫如理子曰難勝莫如己私學者能克之非大勇乎論書篇或問坤者臣道也在君亦有用乎子曰厚德載物豈非人君之用子曰堯夫厯差之法妙絶乎古人矣蓋於日月交感之際以陰陽盈虛求之是以不差隂常虧陽常盈差之所由也昔洛下閎之作厯也謂數百年之後當有一日之差乎何承天慮其差也則以所差之之分均於所厯之年以考每歲所差之多少謂之歲差法而差終不可定也子曰五經之言涵蓄渾然無精粗之别子曰春秋是是非非因人之行事不過當年數人而已窮理之要也學者不必他求學春秋可以盡道矣然以通語孟為先或問春秋發微子曰述法而不通意子曰易變易也隨時變易以從道也至微者理至著者象體用一源顯微無間故善學者求之必自近易於近非知易者也子曰有謂六經為六藝之文何其求之於淺也劉絢問孔子何為作春秋子曰由堯舜至於周文質損益其變極矣其法詳矣仲尼參酌其宜以為萬世王制之所折中焉此作春秋之本意也觀其告顔子為邦之道可見矣子曰春秋事在二月則書王二月事在三月則書王三月無事則書天時書首月蓋有事則道在事無事則存天時正王朔天時備則歲功成王道存則人理立春秋之大義也子曰諸侯當上奉天時下承王正故春秋曰春王正月明此義則知王與天同大而人道立矣或問易有大過何也子曰聖人盡道而無過故曰大過亦當事之大耳猶堯舜禪遜湯武放伐之類也道無不中也無不常也以世人所不常見則謂之大過於常耳是故立非常之大事興不世之大功成絶俗之大德皆大過之事而實無所過也子曰素問出於戰國之際或以為三墳者非也然其言亦有可取者或問何說也子曰善言天者必有驗於人善言古者必有驗於今豈不當哉若運氣則不可用子曰陰陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其說而不得其理是以所言多失子曰禮記之文多謬誤者儒行經解非聖人之言也夏后氏郊鯀之篇皆未可據也子曰周禮之書多訛闕然周公致太平之法亦存焉在學者審其是非而去取之爾子曰原道之作其言雖未盡善然孟子之後識道之所傳者非誠有所見不能斷然言之如是其明也其識大矣子曰漢儒之談經也以三萬餘言明堯典二字可謂知要乎惟毛公董相有儒者氣象東京士人尚名節加之以明禮義則皆賢人之德業矣本朝經典比之前代為盛然三十年以來議論尚同學者於訓傳言語之中不復致思而道不明矣子曰魯桓公弒君而自立其無歲不及諸侯之盟㑹者所以結外援而自固也齊逺與戎盟春秋危之而書至者以謂戎也苟不知鄭真陳之黨惡而同為不義則必執之矣此居夷浮海之意也子曰自古篡弒多出於公族蓋其自謂曰先君子孫也可以君國而國人亦以為然從而奉之也聖人明大義以示萬世故入春秋之初其弒君者皆絶屬籍蓋為大惡既自絶於先君之世矣豈得復為子孫也古者公侯刑死則無服况於弒君乎此義既明矣而或有以屬稱者可見其寵之太過任之太重以階亂也春秋所書大槩事同則詞同後之學者因以謂之例然有事同而詞異者其義各不同蓋不可以例斷也子厚為二銘以啓學者其一曰訂頑訂頑曰云云楊子問西銘深發聖人之微意然言體而不及用恐其流至於兼愛後世有聖賢而推本而論未免歸過於橫渠夫子盍為一言推明其用乎子曰橫渠立言誠有過乃在正䝉至若訂頑明理以存義擴前聖所未發與孟子性善養氣之論同功豈墨氏之比哉西銘理一而分殊墨氏則愛合而無分分殊之蔽私勝而失仁無分之罪兼愛而無義分立而推理一以止私勝之流仁之方也無别而迷兼愛至於無父之極義斯亡也子比而同之過矣夫彼欲使人推而行之本為用也反謂不及用不亦異乎楊子曰時也昔從明道即授以此書於是始知為學之大方固將終身服之豈敢疑其失於墨氏比也然其書以民為同胞鰥寡孤獨為兄弟非明者默識焉知理一無分之殊哉故恐其流至於兼愛非謂其言之發與墨氏同也夫惟理一而分殊故聖人稱物逺近親踈各當其分所以施之其心一焉所謂平施也昔意西銘有平施之心無稱物之義疑其辭有未達也今夫子開諭學者當無惑矣或問子厚立言得毋有幾於迫切者乎子曰子厚之為人謹且嚴是以其言似之方之孟子則寬宏舒泰有不及也然孟子猶有英氣存焉是以未若顏子之懿渾然無圭角之可見也或曰聖賢氣象何自而見之子曰姑以其言觀之亦可也子曰訂頑言純而意備仁之體也充而盡之聖人之事也子厚之識孟子之後一人而已耳子謂門弟子曰昔吾受易於周子使吾求仲尼顏子之所樂要哉此言二三子志之子曰乾坤毁無以見易聖人以此洗心退藏於密夫所謂易也此也密也果何物乎聖人所以示人者深且明矣學者深思當自得之得之則於退藏之密奚逺乎子曰讀書而不留心於文義則荒忽其本意專精於文義則必固滯而無所通逹矣或問王介甫有言乾之九三知九五之位可至而至之如何子曰使人臣每懷此心大亂之道也且不識湯武之事矣然則謂何子曰知大人之道為可至則學而至之所謂始條理者智之事也或問胡先生以九四為太子爻可乎子曰胡為而不可當大臣則為大臣當儲二則為儲二顧用之何如耳苟知其一而不知其變則三百八十四爻止於三百八十四事而已矣子曰夫人之說無可極者惟朋友講習以相資益為說之至也子曰大學孔子之遺言也學者由是而學則不迷於入德之門也子曰大學之道明德新民不分物我成德之事也或問人以能立為能賢而易取於隨何也子曰隨者順理之謂也人君以之聽善臣下以之奉命學者以之徙義處事以之從長豈不立哉言各有當也若夫隨時而動合宜適變不可以為典要非造道之深知幾可與權者不能與也子曰由孟子可以觀物或問窮經㫖當何所先子曰於語孟二書知其要㫖所在則可以觀五經矣讀語孟而不知道所謂雖多亦奚以為子曰凡書載事容有輕重而過其實學者當識其義而已苟信於詞則或有害於義曾不若無書之為愈也子曰孟子言三代學制與王制所記不同王制有漢儒之說矣子曰孟子養氣之論學者所當潛心也勿忘勿助長養道當然非氣也雖然既已名之曰氣則非漠然無形體可識也如其漠然無形體尚何養之有是故語其體則與道合語其用則無非義也子曰易之有象猶人之守禮法也子曰春秋之時諸侯不禀命天王擅相侵伐聖人直書其事而常責夫被侵伐者蓋加兵於巳則引咎自責或辨諭之以禮又不得免焉則固其封疆上告之天王下告之方伯近赴於鄰國必有所直矣苟不勝其忿而與之戰則以與之戰者為主責已絶亂之道也劉絢問讀春秋以何道為凖子曰其中庸乎欲知中庸其惟權乎權之為言稱輕重之義也權義而上不可容聲矣在人所見如何耳張閎中曰易之義起於數子曰有理而後有象有象而後有數易者因象以明理由象而知數得其理而象數在其中矣必欲窮象之隱微盡數之毫忽乃尋流逐末術家之所尚管輅郭璞之流是也非聖人之道也閎中曰象數在理中何謂也子曰理無形也故因象以明理理既見乎辭則可以由辭而觀象故曰得其理則象數舉矣子曰乾九三言聖人之學也坤六二言賢人之學也此其大致也若夫敬以直內義以方外則雖聖人不越乎此無異道故也子為易傳成門人再三請傳終不可問其故子曰尚不祈有少進也乎時年已七十餘矣子曰卜筮有疑心則不應子曰孔子之言莫非自然孟子之言莫非實事子曰厯法之要以日為主日正則餘皆可推矣或問䝉之上九不利為冦夫冦亦可為而聖人教之以利乎子曰非是之謂也昏蒙之極有如三苗者征而誅之若秦皇漢武窮兵暴虐則自為冦也謝師直與明道言春秋明道或可之又言易明道不可師直無忤色他日又以問伊川伊川曰二君知易矣師直曰伯淳不我與而子何為有是言也子曰忘刺史之勢而屈以下問忘主簿之卑而直言無隱是固易之道也子讀春秋至蕭魚之㑹嘆曰至哉誠之能感人也晉悼公推誠以待反覆之鄭信而不疑鄭自是而不復背晉者二十有四年至哉誠之能感人也子既老門人屢請易傳教而習之得以親質諸疑子曰書雖未出而亦未嘗不傳也但知之者鮮耳其後黨論大興門人弟子散而四歸獨張繹受其書於垂絶之日子曰孟子之時去先王為未逺其所學於古者比後世為未缺也然而周室班爵祿之制已不聞其詳矣今之禮書皆掇拾秦火之餘漢儒所傅㑹者多矣而欲句為之解字為之訓固已不可又况一一追故迹而行之乎子曰禮儀三千非拂民之欲而強其不能也所以防其欲而使之入道也多識於鳥獸草木之名非教人以博雜為功也所以由性情而明理物也子曰讀書者當觀聖人所以作經之意與聖人所以為聖人而吾之所以未至者求聖人之心而吾之所以未得焉者晝誦而味之中夜而思之平其心易其氣闕其疑其必有見矣子曰詩書之言帝皆有主宰之意者也言天皆有涵覆之意者也言王皆公共無私之意也上下數千年若合符節或問嚴父配天何以不言武王而曰周公其人也子曰周家制作皆自乎周公故言禮必歸焉或問周公既禱三王而藏其文於金縢之匱中豈逆知成王之信流言將以語之乎子曰以近世觀焉祝册既用則或焚之或埋之豈周公之時未有焚埋之禮也而欲敬其事故若此乎子曰禁人之惡者獨治其惡而不絶其為惡之原則終不得止易曰豶豕之牙吉見聖人處機㑹之際也子曰先儒有言乾位西北坤位西南今以天觀之無乎不在何獨有於西北又曰乾位在六子而自處於無為之地夫風雷山澤水火之六物者乃天之用猶人之身耳目口鼻各致其用而曰身未嘗有為也則可乎子曰盡天理斯謂之易子曰作易者自天地幽明至於昆蟲草木之微無一而不合子曰退之作羑里操曰臣罪當誅兮天王聖明可謂知文王之心矣子曰作詩者未必皆聖賢孔子之取也取其止於禮義而已然比君以碩鼠目君為狡童疑於禮義有害也不以辭害意可也子曰先儒以考槃不復見君而告之永誓不諼吾心實若是也此非君子之心也齊梁之君陋矣乃若孟子則每有顧戀遲留而不忍去之意今曰君一不我用我則永誓而不見也豈君子之心哉或曰然則為此詩者何謂也子曰賢者退而窮處雖去而不忘君然猶慕之深也君臣之義猶父子之恩安得不怨故於寤寐而不忘末陳其不得見君而告之又自陳此情之不詐也忠厚之至也子曰上古世淳而人朴順事而為治耳至堯始為治道因事制法著見功迹而可為典常也不惟隨時亦其憂患後世而有作也故作史者以典名其書或曰大學在止於至善敢問何謂至善子曰理義精微不可得而名言也姑以至善目之默識可也或問中庸九經先尊賢而後親親何也子曰道孰先於親親然不能尊賢則不知親親之道故堯之治必先克明峻德之人然後以親九族或曰文中子答或人學易之問曰終日乾乾可也此盡道之言也文王之聖純亦不已耳子曰凡講經義等次推而上之焉有不盡者然理不若是也終日乾乾未足以盡易在九三可也苟曰乾乾者不巳也不巳者道也道者易也等次推而上之疑無不可者然理不若是也子讀易至履嘆曰上下之分明而後民志定民志定而後可以言治也古之時公卿大夫而下位各稱其德終身居之得其分也有德而位不稱焉則在上者舉而進之士知修其身學成而君求之皆非有預於已也四民各勤其事而所享有限故皆有定志而天下之心可一後世自庶士至於公卿日志乎尊榮農工商賈日志乎富侈億兆之心交騖於利而天下紛然欲其不亂難矣子曰農夫勤瘁播種五榖絲麻吾得而衣食之百工技藝作為器械吾得而用之甲胄之士扞守疆圉吾得而安之惟有修葺聖人之遺言以待後之學者兹為小補耳或問制器取諸象也而象器以為卦乎子曰象在乎卦而卦不必先器也聖人制器不待見卦而後知象以衆人由之而不能知之故設卦以示之耳或問麟鳯和氣所生太平之應也鳯鳥不至孔子曰吾已矣夫而麟見獲於春秋之季何也子曰聖人之生乃天地交感五行之秀㑹也以仲尼元聖尚生於春秋之時而况麟乎子曰論語一書未易讀也有既讀之而漠然如未嘗讀者有得一二而啓悅其心者有通體誠好之者有不知其手之舞之足之蹈之者子曰讀論語而不知道所謂雖多奚為也於是有要約精至之言能深窮之而有所見則不難於觀五經矣子曰艮止其所也萬物各止其所分無不定矣論政篇子曰孔子為政先正名名實相須故也一事苟則無不苟者矣子曰善言治者必以成就人才為急務人才不足雖有良法無與行之矣欲成就人才者不患其禀質之不美患夫師學之不明也師學不明雖有美質無由成之矣子曰八十四聲各盡其清濁之極然後可以考中聲聲必本乎律不得乎律則中聲不可得矣律者自然之數也今世有三命之術以五行支幹納音推之蓋律之遺也而用之者末矣欲度量權衡之得其正必自律起而律必取於黃鐘以律管定尺蓋凖氣乎天地非積秬黍比也秬黍積數在先王時惟此物適與度量合故可用也今則不可矣子曰養親之心無有極也貴貴尊賢之義亦何有極乎子曰古之聖王所以能化姦惡為善良綏仇敵為臣子者由弗之絶也苟無含洪之道而與己異者一皆弃絶之不幾於棄天下以讐君子乎故聖人無棄物王者重絶人子與韓公范公泛舟於潁湖有屬吏求見韓公公出已見之退而不悅曰謂其以職事來也乃求薦舉耳子曰公為州太守不能求之顧使人求君乎范公曰子之固每若是也夫今世之仕者求舉於其人蓋常事耳子曰是何言也不有求者則遺而不及知也是以使之求之歟韓公無以語愧且悔者久之子顧范公曰韓公可謂服義矣李籲問臨政無所用心求於恕何如子曰推此心行恕可也用心求恕非也恕巳所固有不待求而後得舉此加彼而已子曰事事物物各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也惟止之各於其所而已止之不得其所則無可止之理子曰養民者以愛其力為本民力足則生養遂然後教化可行風俗可美是故善為政者必重民力子曰為治而不法三代苟道也堯舜不可及已三代之治其可復必也子曰封禪本於祭天後世行之祗以自誇美而已王仲淹曰非古也其秦漢之侈心乎斯言當矣或曰周頌告於神明非乎子曰陳先王之功德而非自誇美也子曰聖人為戒必於方盛之時方盛慮衰則可以防其滿極而圗其永久至於既衰而後戒則無及矣自古天下之治未有久而不亂者蓋不能戒於其盛也狃安富則驕侈生樂舒肆則紀綱壞忘禍亂則釁蘖萌是以浸淫滋蔓而不知亂亡之相尋也明道在鄠邑政聲流聞當路欲薦之朝而問其所欲對曰夫薦士者量才之所堪不問志之所欲明道守官京兆南山有石佛放光於頂上逺近聚觀男女族集為政者畏其神而不敢止子使戒其徒曰我有官守不能往也當取其首來觀之耳自是光遂滅人亦不復疑也子曰聖人感天下之心如寒暑雨暘無所不通無所不應者正而已矣正者虛中無我之謂也以有繫之私心膠於一隅主於一事其能廓然通應而無不遍乎子曰治蠱必求其所以然則知救之之道又慮其將然則知備之之方夫善救則前弊可革矣善備則後利可久矣此古聖人所以新天下垂後世之道子曰古之人重改作變政易法人心始以為疑者有之矣久而必信乃其改作之善也始既疑之終復不信而能善治者未之有也子謂子厚曰議法既備必有可行之道子厚曰非敢言也顧欲載之空言庶有取之者耳子曰不行於今而後世有行之者亡也子曰聖王為治修刑罰以齊衆明教化以善俗刑罰立則教化行矣教化行而刑措矣雖曰尚德而不尚刑顧豈偏廢哉子曰自古聖人之救難而定亂也設施有未暇及焉者既安之矣然後為可久可繼之治自漢而下禍亂既除則不復有為姑隨時維持而已所以不能髣佛於三代歟子曰守國者必設險山河之固城郭溝洫之阻特其大端耳若夫尊卑貴賤之分明之以等威異之以物采凡所以杜絶陵僭限隔上下者皆險之大用也子曰三代而後漢為治唐次之漢大綱正唐萬目舉子曰戰國之際小國介乎強大之間而足以自持者先王之分界約束未亡故也今混一之形如萬頃之澤祖宗涵濡既久矣故人心弭然柔伏雖有姦猾欲起而無端也子曰善為治者莫善乎靜以守之而或擾之猶風過乎澤波濤洶湧平之實難故一正則難傾一傾則難正者天下之勢也子曰古者使以德爵以功世祿而不世官故賢才衆而庶績成及周之衰公卿大夫皆世官政由是敗矣子曰今責罪官吏無養廉恥之道或曰何類子曰如徒流杖使以銅贖之類也古者責不廉曰簠簋不飭而已忠厚之至也子曰賜進士第使衛士掖之以見天子不若使趍進而雍容也大臣孰不由此塗出立侍天子之側曾無愧乎子厚曰先示以第名使以次見則亦可矣有少監逮繫乎越獄子曰卿監以上無逮繫為其近於君也君有一時之命有司必執常法而不敢從焉君無是命而有司請加之桎梏下則叛法上則無君非之大也子厚曰獄情不得則如之何子曰寧獄情之不得而朝廷之大義不可虧也子曰後世有治獄而無治市周公則有其政矣曺參之治齊以獄市為寄其時為近古也子曰舉措合義則民心服子曰治則有為治之因亂必有致亂之因在人而已矣或問敬者威儀儼恪之謂乎子曰非也是所以成敬之具爾子曰為政必立善法俾可以垂久而傳逺若後世變之則末如之何矣子曰古之仕者為人今之仕者為巳或人謀仕於子邑尉責重邑簿責輕子曰尉能治盜而已不能使民不為盜簿佐令治邑宜使民不為盜也而謂責輕可乎或曰治獄之官不可為子曰苟能充其職則一郡無寃民矣子曰立治有體施治有序酌而應之臨時之宜也子曰遊文定公之門者多知稽古而愛民誠如是亦可從政矣子曰今之度量權衡非古法之正也姑以為凖焉可耳凡物不出於自然必人為之而後成惟古人能得其自然也子曰明道臨政之邦上下響應蓋有以協和衆情則風動矣天地造化風動而已子曰今代之稅視什一為輕矣但斂之無法而不均是以疑於重也子曰世未嘗無美材也道不明於天下則無與成其材古人之為詩猶今人之樂曲閭閻童稚皆熟聞而樂道之故通曉其義後世老師宿儒尚未能明也何以興於詩乎古禮既廢人倫不明治家無法祭則不及其祖喪必僧之是用何以立於禮乎古人歌詠以養其性情舞蹈以飬其血氣行步有佩玉登車有鸞和無故而不去琴瑟今也俱亡之矣何以成於樂乎噫古之成材也易今之成材也難晉城縣有令宰書名石明道記之曰古者諸侯之國各有史故其善惡皆見乎後世自秦罷侯置守令則史亦從而廢其後惟有功德者或記之循吏與夫凶殘之極者以酷見傳其餘則泯然無聞矣如漢唐之有天下皆數百年其間郡縣之政可書宜亦多矣然其所書大率才十數人使賢者之政不幸而無傳其不肖者復幸而得傳蓋其意斯與古史之意異矣夫圗治於長久者雖聖賢為之且不能倉卒苟簡而就蓋必本之人情而為之法度然後可使去惡而從善則紀綱條教必審定而後行其民之服循漸漬亦必待久而乃淳固而不變今之為吏三歲而代者固已遲之矣使皆知禮義其自始至即皇皇然圗所設施則教令未熟民情未孚而吏書已至矣儻後之人所志不同復有甚者欲新已之政而盡去其舊則其迹固已無餘而况因循不職者乎夫以易息之政而又無以託其傳則宜其去皆未幾而善惡無聞焉故聞古史之善而不可得則因今有書前政之名氏以為記者尚近古第其先後而記之俾民觀其名而不忘其政後之人得從而質其是非以為師戒云爾子曰兵以正為本動衆以毒天下而不以正則民不從而怨敵生亂亡之道也是以聖王重焉東征西怨義正故也子曰行師之道以號令節制行師無法幸而不敗耳勝者時有之矣聖人之所戒也青苗之法初行明道時居言職言於上曰明者見於未形智者防於未亂安危之本在人情治亂之機係事始衆心暌乖則有言不信矣萬邦協和則所為必成矣今條例司劾不行之官駁老成之奏乃舉一偏而盡廢公議因小事而先動衆心難乎其能濟矣子曰唐朝政事付之尚書省近乎六官之制第法不具爾宇文周官名度數小有可觀者也隋文之法無不善者而多以臆决故不足以持久或問孔子何譏大閲曰為國者武備不可廢則農隙而講肄焉有時有制保國守民之道也魯之秋八月則夏六月也盛夏閲兵妨農害人其失政甚矣有警而為之無及也無事而為之妄動也是以聖人不與子曰居今之世則當安今之法令治今之世則當酌古以處時制度必一切更張而後可為也亦何義乎子曰後漢名節之風既成未必皆自得也然一變可至於道矣子謂子厚曰洛之俗難化於秦之俗子厚曰秦之士俗尤厚亦和叔啓之有力焉今而用禮漸成風化矣子曰由其氣質之徑勇於行也子厚曰亦自吾規矩不迫也子曰先王以仁義得天下而教化之後世以智力取天下而糾持之古今之所以相絶者逺矣子曰三代而後有聖王者作必四三王而立制矣或曰夫子云三重既偹人事盡矣而可四乎子曰三王之治以宜乎今之世則四王之道也若夫建亥為正則事之悖繆者也子曰五帝公天下故與賢三王家天下故與子論善之盡則公而與賢不易之道也然賢人難得而爭奪興焉故與子以定萬世是亦至公之法也子曰王氏之教靡然而同是莫大之患也以彼之才之言而行其學故其教易以入人始也以利從久則心化之今而既安矣天下弊事一日而可革若衆心既定風俗已成其何可遽改也子曰赤子未有知未能言其志意嗜欲未可求而其母知之何也愛之至謹出於誠也視民如父母之於赤子何失之有子曰必井田必肉刑必封建而後天下可為非聖人之達道也善治者放井田而行之而民不病放封建而臨之而民不勞放肉刑而用之而民不怨得聖人之意而不膠其迹迹者聖人因一時之利而利焉者耳子曰治道有自本而言有就事而言自本而言莫大乎引君當道君正而國定矣就事而言未有不變而能有為者也大變則大益小變則小補子曰苻堅養民而用之一敗不復振無本故也子曰用兵以能聚散為上子曰古無之而今有之者一釋老是也子曰有田則有民有民則有兵侯仲良侍坐語及牛李朋黨事子曰作成人材難變化人才易元豐諸人其才皆有用繫君相變化之耳凡人之情豈甘心以小人自為也在小人者用之於君子則其為用未必不賢於今之人也子曰治道之要有三曰立志責任求賢子曰賢不肖之在人治亂之在國不可歸之命子曰宗子無法則朝廷無世臣立宗子則人知重本朝廷之勢自尊矣古者子弟從父兄今也父兄從子弟由不知本也人之所以順從而不辭者以其有尊卑上下之分而已苟無法以聨屬之可乎子曰漢文誅薄昭李衛公謂誅之是溫公曰誅之非考之於史不見所以誅之之故則未知昭有罪漢遣使治之而殺漢使乎抑將與漢使飲酒因怒而致殺也誅之不以罪太后憂悒不食而至於大故則如之何如治其罪而殺王朝之使者雖寐不安席食不甘味昭之死不可免必知權其輕重然後可議其誅之當否也子曰論治者貴識體子曰治國齊家以至平天下者治之道也建立綱紀分正百職順天揆事創制立度以盡天下之務治之法也法者道之用也子曰古之時分羲和以職天運以正四時遂司其方主其時政在堯謂之四嶽周乃六卿之任統天下之治者也後世學其法者不復知其道故星厯為一技之事而與政分矣吕進明為使者河東子問之曰為政何先對曰莫要於守法子曰拘於法而不得有為者舉世皆是也若某之意謂猶有可遷就不害於法而可以有為者也昔明道為邑凡及民之事多衆人所謂於法有礙焉者然明道為之未嘗大戾於法人亦不以為駭也謂之得伸其志則不可求小補焉則過之與今為政逺矣人雖異之不至指為狂也至謂之狂則必大駭盡誠為之不容而後去之又何嫌乎子移書河東使者吕進明曰王者父天母地昭事之道當於嚴敬漢武逺祀地示於汾陰既非禮矣後世之人又建祠宇其失愈甚因唐人有妖人作韋安道傳遂設以配食焉誣瀆惡有大於此者乎公為使者此而不正尚何為哉宜以其象投之河流不必請於朝不必詢於衆不必虞後患幸勿疑也子移書河東帥曰公蒞鎮之初僉言交至必曰敵既再犯河外不復來也可高枕矣此特常言未知竒勝之道也夫攻必取者攻其所不守也謂其不來乃其所以來也今日彼不徒興大衆必不利於河外既空之地是大不然彼誠得出吾不意破蕩數壘已足以勞敝一道為利大矣何必負戴而歸然後為利也夫謀士悅其寬憂計司幸於緩責衆論既一公雖未信而上下之心已懈矣故為今之計寧捐力於不用毋惜功而致悔豈獨使敵人知我有備而不來當使內地人信吾可恃而願往則數年之內遂至全實疆場安矣此長久之䇿也自古乘塞禦敵必用驍猛招來撫養多在儒將今日之事則異於是某以荷德之深思所報也是以有言惟公念之論事篇子曰行事在審已不必恤浮議恤浮議而忘審已其心馳矣子曰息止也生也一事息則一事生生息之際無一毫之間碩果不食即為復矣子曰久閲事機則機心生方其閲時而喜入其趣則猶物之遺種未有不生者也子曰天下之事無一定之理不進則退不退則進時極道窮理當必變惟聖人為能通其變於未窮使其不至於極堯舜時也子曰或謂賢者好貧賤而惡富貴是反人之情也所以異於人者以守義安命焉耳或人惡多事子曰莫非人事也人而不為俾誰為之子曰天下之事苟善處之雖悔可以成功不善處之雖利反以為害子曰人以料事為明則駸駸乎逆詐而億不信或問無妄之道子曰因事之當然順理而應之或曰聖人制作以利天下皆造端而非因也豈妄乎子曰因風氣之宜未嘗先時而開人也如不待時則一聖人足以盡舉又何必纍聖繼聖而後備時乃事之端聖人隨時而已子曰疾而委身於庸醫比之不慈不孝况事親乎舍藥物可也是非君子之言也子曰關中學者正禮文乃一時之事爾必也修身立教然後風化及乎後世子曰天地之生萬物之成合而後遂天下國家至於事為之末所以不遂者由不合也所以不合者由有間也故間隔者天下之大害聖王之所必去也子曰惟篤實可以當大事子曰養不全固者處事則不精歷事則不記子曰豫備也豫逸也事豫備故逸樂子曰萬變皆在人爾其實無一事子曰一世之才足以周一世之事不能大治者由用之不盡耳子曰君子之遇事一於敬而已簡細故以自崇非敬也飾私智以為竒非敬也子曰謝良佐因論求舉於方州與就試於太學得失無以異遂不復計較明且勇矣子曰禮院關天下之事得其人則凡舉事可以考古而立制非其人未免隨俗而已子曰較事大小其弊必至於枉尺直尋子曰西邉用師非小故也未聞一人勸止其事者自古舉事不以大小必度其是非可否於衆庶而不敢專也今雖公卿惟其言而莫違况其下者乎逢合之習如此幾何不至于一言喪邦子曰凡避嫌處事者皆內不足所為誠公矣初何嫌之足避乎新法將行明道言於上曰天下之理本諸簡易而行以順道則事無不成者故曰智者如禹之行水行其所無事也捨而行之於險阻則不足以言智矣自古興治雖有專任獨决能就一時之功者未聞輔弼之論乖臣庶之心戾而能有為者也况於施置失宜沮廢公論國政異出名分不正用賤陵貴以不肖治賢者乎凡此皆理不克成而智者之所不行也設令由此僥幸就緒而興利之臣日近尚德之風寖衰非朝廷之福也今天時未順地震連年人心日益搖動此陛下所宜仰觀俯察而深念者也子曰至顯莫如事至微莫如理而事理一致也微顯一源也古之所謂善學以其能通於此而已子曰外事之不知非患也人患不能自見耳子曰古之強有力者將以行禮今之強有力者將以為亂子曰公天下之事苟以私意為之斯不公矣子曰閲天下之事至於無可疑亦足樂矣子曰世以隨俗為和非也狥流而已矣君子之和和於義子曰官守當事不可以苟免子曰籩豆簠簋不可用於今之世風氣然也不席地而椅桌不手飯而匕筯使其宜於世而未有聖人亦必作之矣吕申公嘗薦處士常秩秩既起他日稍變其節申公謂知人實難以語明道且告之悔明道曰然不可以是而懈於好賢之心也申公矍然謝之子曰事以急而敗者十常七八子曰好疑者於事未至而疑端先萌好周者於事未形而周端先著皆心之病也二程粹言卷上
