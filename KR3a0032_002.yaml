body:
  text: 程粹言卷下宋楊時編天地篇子曰霜金氣也露星月之氣也露結為霜非也雷由隂陽相薄而成蓋沴氣也子曰雨水冰上溫而下寒也隕霜不殺草上寒而下溫也子曰日月之為物隂陽發見之尤盛者也劉安節問人有死於雷霆者無乃素積不善常歉然於其心忽然聞震則懼而死乎子曰非也雷震之也然則雷孰使之乎子曰夫為不善者惡氣也赫然而震者天地之怒氣也相感而相遇故也曰雷電相因何也子曰動極則陽形也是故鑽木戞竹皆可以得火夫二物者未嘗有火也以動而取之故也擊石火出亦然惟金不可以得火至隂之精也然軋磨既極則亦能熱矣陽未嘗無也或問五德之運有諸子曰有之大河之患少於唐多於今土火異王也關子明推占吉凶必言致之之由與處之之道曰大哉人謀其與天地相終始乎故雖天命可以人勝也善飬生者引將盡之年善保國者延既衰之祚有定理也子曰冬至之前天地閉塞可謂靜矣日月運行未嘗息也則謂之不動可乎故曰動靜不相離子曰致敬乎鬼神理也昵鬼神而求焉斯不知矣子曰隂過之時必害陽小人道盛必害君子欲無害者惟過為防耳弗過防之從或戕之或問天帝之異子曰以形體謂之天以主宰謂之帝以至妙謂之神以功用謂之鬼神以情性謂之乾其實一而已所自而名之者異也夫天專言之則道也子曰天地所以不已有常久之道也人能常於可久之道則與天地合或問日月有定形乎抑氣散而復聚也子曰難言也然究其極致則二端一而已范蜀公謂鬼神之際曰佛氏謂生為此死為彼無是理也子曰公無惑則有是言也蜀公曰鬼神影響則世有之子曰公有所見則無是言也子曰卜筮在我而應之者蓍龜也祭祀在我而享之者鬼神也夫豈有二理哉亦一人之心而已卜筮者以是心求之其應如響徇以私意及顚錯卦象而問焉未有能應者蓋無其理也古之言事鬼神者曰如有聞焉如有見焉則是鬼神答之矣非真有見聞也然則如有見聞者誰歟子曰天聰明自我民聰明言理無二也若夫天之所為人之所能則各有分矣子曰天地之心以復而見聖人未嘗復故未嘗見其心子曰天地之道至順而已矣大人先天不違亦順理而已矣或問鬼神之有無子曰吾為爾言無則聖人有是言矣為爾言有爾得不於吾言求之乎子曰天地之間感應而已尚復何事子曰日月之在天如人之有目目無背見日月無背照也子曰氣化之在人與在天一也聖人於其間有功用而已子曰天地日月其理一致月受日光而不為之虧月之光乃日之光也地氣不上騰天氣不下降天氣下降至於地中生育萬物者乃天之氣也或問日食有常數者也然治世少而亂世多豈人事乎子曰天人之理甚微非燭理明其孰能識之曰無乃天數人事交相勝負有多寡之應耶子曰似之未易言也子曰君子宜獲福於天而有貧瘁夭折者氣之所鍾有不周耳子曰天地隂陽之運升降盈虛未嘗暫息陽常盈隂常虧一盈一虧參差不齊而萬變生焉故曰物之不齊物之情莊周強齊之豈能齊也或謂張繹曰吾至於間靜之地則灑然心悅吾疑其未善也繹以告子子曰然社稷宗廟之中不期敬而自敬是平居未嘗敬也使平居無不敬則社稷宗廟之中何敬之改修乎然則以靜為悅者必以動為厭方其靜時所以能悅靜之心又安在哉或問人多惑於鬼神怪異之説何也子曰不明理故也求之於事事則奚盡求之於理則無蔽故君子窮理而已子曰古今異宜人有所不便者風氣之異也日月星辰皆氣也亦自異於古耳月何食不受日光也何為不受與日相當隂盛抗陽不下於日也古者鼓以救日月之食然則月之食亦可鼓者以其助陽歟子曰五祀非先王之典以為報邪則遺其重而舉其輕者夫門之用顧大於井之功乎祭門而不祭井何説也子曰當大震懼能自安而不失者惟誠敬而已子曰靜動者隂陽之本也五氣之運則參差不齊矣子曰史遷曰天與善人伯夷善人非耶此以私意度天道也必曰顔何為而夭跖何為而壽指一人而較之非知天者也子曰有理則有氣有氣則有數鬼神者數也數者氣之用也或謂殺孝婦而旱豈非衆寃所感邪子曰衆心固寃之耳而一人之精誠自足以動天地也然則殺暴姑而雨豈婦寃既釋邪子曰寃氣固散矣而衆心之憤亦平也子曰天地之間善惡均於覆載未嘗有意於簡别也顧處之有道耳聖人即天地也子曰天地之化雖蕩蕩無窮然隂陽之度寒暑晝夜之變莫不有常久之道所以為中庸也子曰萬物皆本乎天人本乎祖故以冬至祭天而祖配之以冬至者氣至之始也萬物成形於帝人成形於父故以季秋享帝而父配之以季秋者物成之時也子曰事鬼神易為尸難孝子有思親之心以至誠持之則可盡其道矣惟尸象神祖考所以來格者也後世巫覡蓋尸之遺意但流為偽妄不足以通幽明矣致神必用尸後世直以尊卑勢遂不行三代之末亦不得已焉而廢耳子曰物之名義與氣理通貫天之所以為天本何為哉蒼蒼焉耳矣其所以名之曰天蓋自然之理也名出於理音出於氣字書由是不可勝窮矣子曰隂陽之氣有常存而不散者日月是也有消長而無窮者寒暑是也子曰天理生生相續不息無為故也使竭智巧而為之未有能不息也子曰在此而夢彼心感通也已死而夢見理感通也明乎感通則何逺近死生今古之别哉楊定鬼神之説其能外是乎子曰老氏言虛能生氣非也隂陽之開闔相因無有先也無有後也可謂今日有陽而後明日有隂則亦可謂今日有形而後明日有影也或問天地何以不與聖人同憂也子曰天地不宰而成化聖人有心而無為子曰天地生物之氣象可見而不可言善觀於此者必知道也聖賢篇或問聖人有過乎子曰聖人而有過則不足以為聖人矣曰夫子學易而後無大過者何謂也子曰非是之謂也猶刪詩定書正樂之意也自期年至於五十然後乃贊易則易道之過誤者鮮矣曰易亦有過乎曰如八索之類亂易者多矣子曰聖人之道猶天然門弟子親炙而冀及之然後知其高且逺也使誠若不可及則趨向之心不幾於怠乎故聖人之教常俯而就之曰吾無隱乎耳吾非生知好古敏以求之者也非獨使資質庸下者勉思企及而才氣高邁者亦不敢躐等而進也子曰損益文質隨時之宜三王之法也孔子告顔淵為邦者萬世不易之法也子曰孟子論子濯孺子之事特曰不背師可稱也非言事君之道也事君而若此不忠之大也子曰齊桓之正正舉其事爾非大正也管子之仁仁之功爾非至仁也或問泰伯之三讓子曰不立一也逃焉二也文身三也或問趙盾越境果可免乎子曰越境而反且不討賊猶不免也必曰越境而不反然後可免耳子曰泰山雖高矣絶頂之外無預乎山也唐虞事業自堯舜觀之亦猶一點浮雲過於太虛耳子曰桓魋不能害己孔子知矣乃微服過宋象將殺己舜知之矣乃同其憂喜飢溺而死有命焉而禹稷必救之國祚修短有數焉而周公必祈之知性命並行而不相悖然後明聖人之用子曰顔回在陋巷淡然進德其聲氣若不可聞者有孔子在焉若孟子安得不以行道為己任哉或問聖人亦有為貧之仕乎子曰為委吏乘田是也或曰亦為之兆乎曰非也為魯司冦則為之兆也或人因以是勉子從仕子曰至於飢餓不能出門户之時又徐為之謀耳子曰子厚之氣似明道子曰天子之職守宗廟而堯舜以天下與人諸侯之職守社稷而大王委去之惟聖賢乃與於此學者守法可也子曰聖賢在上天下未嘗無小人也能使小人不敢肆其惡而已夫小人之本心亦未嘗不知聖賢之可説也故四凶立堯朝必順而聽命聖人豈不察其終出於惡哉亦喜其面革畏罪而已苟誠信其假善而不知其包藏則危道也是以雖堯舜之盛於此未嘗無戒戒所當戒也或問伐國不問仁人然則古之人不伐國其伐者皆非仁人乎子曰展禽之時諸侯以土地之故暴民逞欲不義之伐多矣仁人所不忍見也况忍言之乎昔武王伐紂則無非仁人也子曰強者易抑子路是也弱者難強宰我是也子曰信一也而有淺深七十子聞一言於仲尼則終身守之而未必知道此信於人者也若夫自信孰得而移之劉安節問曰志篤於善而夢其事者正乎不正子曰是亦心動也曰孔子夢見周公何也子曰聖人無非誠夢亦誠不夢亦誠夢則有矣夢見周公則有矣亦豈寢而必夢夢而必見周公歟子語楊迪曰近所講問設端多矣而不識大槩夫二三子豈皆智不足以知之由不能自立於衆説漂照之間耳信不篤故也仲尼之門人其所見非盡能與聖人同也惟不敢執已而惟師之信故求而後得夫信而加思乃致知之方也若紛然用疑終亦必亡而已矣子曰其亡其亡繫於苞桑漢王允唐李德裕功未及成而禍敗從之者不知苞桑之戒也李觀有言使管仲而未死內嬖復六人何傷桓公之伯乎子曰管仲為國政之時齊侯之心未蠱也既蠱矣雖兩管仲將如之何未有蠱心於女色而盡心於用賢也或問郭璞以鳩占何理也子曰舉此意向此事則有此兆象矣非鳩可占也使鳩可占非獨鳩也或問孔子不幸而遇害於匡則顔子死之可乎不可乎子曰今有二人相與逺行則患難有相死之道况回於夫子乎曰親在則可乎子曰今有二人相與搏虎其致心悉力義所當然也至於危急之際顧曰吾有親則舍而去之是不義之大者也其可否當預於未行之前不當臨難而後言也曰父母存不許友以死則如此義何子曰有可者逺行搏虎之譬也有不可者如遊俠之徒以親既亡乃為人報仇而殺身則亂民也子曰知幾者君子之獨見非衆人所能及也穆生為酒醴而去免於胥靡之辱薑肱為土室之隱免於黨錮之禍薛山守箕山之節免於新室之汙其知幾矣子曰漢世之賢良舉而後至若公孫𢎞猶強起之者今則求舉而自進也抑曰欲廷對天子之問言天下之事猶之可也苟志於科目之美為進取之資而已得則肆失則沮肆則悅沮則悲不賢不良孰加於此子曰守節秉義而才不足以濟天下之難者李固王允周顗王導之徒是已劉安節問高宗得傅説於夢何理也子曰其心求賢輔雖寤寐不忘也故精誠既至則兆見乎夢文王卜獵而獲太公亦猶是也曰豈夢之者往乎抑見夢之者來乎曰猶之明鑑有物必鑑豈可謂與鑑物有往來哉或問周公欲代武王之死其有是理邪抑曰為之命邪子曰其欲代其兄之死也發於至誠而奚命之論然則在聖人則有可移之理也子曰聖賢於亂世雖知道之將廢不忍坐視而不救也必區區致力於未極之間強此之衰難彼之進圖其暫安而冀其引久苟得為之孔孟之屑為也王允之於漢謝安之於晉亦其庶矣子曰仲尼無迹顔子之迹微顯孟子之迹著見子曰顔子示不違如愚之學於後世和氣自然不言而化者也孟子則顯其才用蓋亦時焉而已矣學者以顔子為師則於聖人之氣象類矣子曰古人以兄弟之子猶子也而人自以私意小智觀之不見其猶也或謂孔子嫁其女異於兄弟之女是又以私意小智觀之不知聖人之心也夫孔子蓋以因其年德相配而歸之何避嫌之有避嫌之事賢者且不為而况聖人乎子曰陳平言宰相之職近乎有學子曰顔子非樂簞瓢陋巷也不以貧纍其心而改其所樂也子曰伯夷不食周粟其道雖隘而又能不念舊惡其量亦宏朱光庭問周公仰而思之者其果有所合乎子曰周公固無不合者矣如其有之則必若是其勤勞而不敢已也子曰遊酢楊時始也為佛氏之學既而知不足安也則來有所請庶乎其能變謝良佐既見明道退而門人問曰良佐何如子曰其才能廣而充之吾道有望矣子曰顔子虛中受道子貢億度而知之子曰子厚堯夫之學善自開大者也堯夫細行或不謹而其卷舒運用亦熟矣子曰邦無道而自晦以免患可以為智矣而比干則非不知也子曰顔孟知之所至則同至於淵彛溫淳則未若顔子者子曰觀武帝問賢良禹湯水旱厥咎何由公孫𢎞曰堯遭洪水不聞禹世之有洪水也而不對所由姦人也子曰堯舜生而知之者也湯武學而至之者也文之德似堯舜禹之德似湯武雖然皆聖人也子曰身之言履也反之言歸乎正也子曰仲尼元氣也顔子猶春生也孟子則兼秋殺見之矣子曰學聖人者必觀其氣象鄉黨所載善乎其形容也讀而味之想而存之如見乎其人子曰魯衛齊梁之君不足與有為孔孟非不知也然自任以道則無不可為者也子曰顔子具體顧微耳在充之而已孟子生而大全顧未粹耳在飬之而已子曰傳聖人之道以篤實得之者曾子是也易簀之際非幾於聖者不及也推此志也禹稷之功其所優為也子曰聖人無夢氣清也愚人多夢氣昏也孔子夢周公誠也蓋誠為夜夢之影也學者於此亦可驗其心志之定否操術之邪正也子曰周勃入北軍問士卒如有右袒將何處哉已知其心為劉氏者不必問也當是之時非陳平為之謀亦不能濟矣迎文帝於霸橋而請問則非其時見河東守尉於其國而嚴兵則非其事幾於無所能者由不知學也子曰仲尼渾然乃天地也顔子粹然猶和風慶雲也孟子巖巖然猶泰山北斗也周茂叔曰荀卿不知誠子曰既誠矣尚何事於養心哉子曰王仲淹隱德君子也其書有格言非其自著也續之者勦入其説耳所謂售偽必假真也通之所得粹矣非荀揚所及續經其偽益甚矣自漢以來制詔之足紀者寡矣晉宋以後詩之足采者微矣孫覺問孔明何如人也子曰王佐曰然則何以區區守一隅不能大有為於天下也子曰孔明欲定中原與先主有成説矣不及而死天也曰聖賢殺一不辜而得天下則不為孔明保一國殺人多矣子曰以天下之力誅天下之賊義有大於殺也孔子請討陳恆使魯用之能不戮一人乎曰三國之興孰為正子曰蜀之君臣志在興復漢室正矣子曰楊墨學仁義而失之者則後之學者有不為仁義者則其失豈特楊墨哉子曰與巽之語聞而多礙者先入也與與叔語宜礙而信者致誠也子曰君子正已而無恤乎人沙隨之會晉侯怒成公後期而不見魯當是時國家有難彼曲我直君子不以為耻也子曰世云漢高能用子房非也子房用漢高耳子曰揚子雲去就無足觀其曰明哲煌煌旁燭無疆則悔其蹈亂無先知之明也其曰遜于不虞以保天命則欲以苟容為全身之道也使彼知聖賢見幾而作其及是乎苟至於無可奈何則區區之命亦安足保也子曰堯夫襟懷放曠如空中樓閣四通八達也子曰揚子雲之過非必見於美新投閣也夫其黽勉莽賢之間而不能去是安得為大丈夫哉子曰韓信多多益辦分數明而已子曰君實謂其應世之具猶藥之參苓也可以補養和平不可以攻治沉痼自處如是必有救之之術矣或問舜能化瞽象於不格姦而何為不能化商均也子曰舜以天下與人必得如己者故難於商均之惡豈聞如瞽象之甚焉子曰張良進退出處之際皆有理蓋儒者也子曰孔門善問無若顔子而乃終日如愚無所問也子曰司馬君實能受盡言故與之言必盡子曰顔子默識曾子篤實得聖人之道者二子也或謂顔子為人殆怯乎子曰孰勇於顔子顔子曰舜何人也豫何人也有為者亦若是有而若無實而若虛孰勇於顔子或問漢文多災異漢宣多祥瑞何也子曰如小人日行不善人不以為言君子一有不善則羣起而議之一道也白者易汙全者易毁一道也以風雅考之幽王大惡為小惡宣王小惡為大惡一道也子曰孟子言已志有德之言也論聖人之事造道之言也子曰子貢之知亞於顔子知之而未能至之者也或問伊尹出處有似乎孔子而非聖之時何也子曰其任也氣象勝子曰人有顔子之德則有孟子之事功孟子之事功與禹稷並或問孟子何以能知言子曰譬之坐乎堂上則其辨堂下之聲如絲竹也苟雜處乎衆言之間羣音囂囂然已且不能自明尚何暇他人之知乎子曰孔子為宰為陪臣皆可以行大道若孟子必得賓師之位而後行也子曰明叔明辨有才氣其於世務練習蓋美才也其學晚溺於佛所謂日月至焉而已者豈不可惜哉遊酢得西銘誦之則渙然於心曰此中庸之理也能求於語言之外也子曰和叔任道風力甚徑而深潛鎮密則於與叔不逮鮮于侁問曰顔子何以能不改其樂子曰知其所樂則知其不改謂其所樂者何樂也曰樂道而已子曰使顔子以道為可樂而樂乎則非顔子矣他曰侁以語鄒浩浩曰吾雖未識夫子而知其心矣或謂佛氏引人入道比之孔子為徑直乎子曰果其徑也則仲尼豈固使學者迂曲其所行而難於有至哉故求徑途而之大道是猶冒險阻披荆棘以祈至於四達之衢爾孟子曰可以仕則仕可以止則止可以久則久可以速則速孔子也孔子聖之時者也知易者莫如孟子矣孟子曰王者之迹熄而詩亡詩亡然後春秋作春秋天子之事也知春秋者莫如孟子矣子曰孔子之道著見於行如鄉黨之所載者自誠而明也由鄉黨之所載而學之以至於孔子者自明而誠也及其至焉一也子曰聞善言則拜者禹之所以為聖也以能問於不能者顔子之所以為賢也後之學者有一善則充然而自足哀哉或問舜不告而娶為無後也而於拂父母之心孰重子曰非直不告也告而不可然後堯使之娶耳堯以君命命瞽瞍舜雖不告堯固告之矣在瞽瞍不敢違而在舜為可娶也君臣父子夫婦之道於是乎皆得曰然則象將殺舜而堯不治焉何也子曰象之欲殺舜無可見之迹發人隱慝而治之非堯也子曰伊尹之耕於莘傅説之築於巖天下之事非一一而學之天下之賢才非人人而知之也明其在我者而已子曰董子有言仁人正其誼不謀其利明其道不計其功度越諸子逺矣或問陋巷貧賤之人亦有以自樂何獨顔子子曰貧賤而在陋巷俄然處富貴則失其本心者衆矣顔子簞瓢由是萬鍾由是子曰有學不至而言至者循其言可以入道門人曰何謂也子曰真積力久則入荀卿之言也優而柔之使自求之饜而飫之使自趨之若江河之浸膏澤之潤渙然冰釋怡然理順杜預之言也思之思之又重思之思而不通鬼神將通之非鬼神之力也精誠之積也管子之言也此三者循其言皆可以入道而三子初不能及此也子曰孔子教人各因其才有以文學入者有以政事入者有以言語入者有以德行入者子曰老氏之言雜權詐秦愚黔首其術蓋有所自或問高宗之於傅説文王之於太公知之素矣恐民之未信也故假夢卜以重其事子曰然則是偽也聖人無偽子曰盟可用要之則不可用要而盟與不盟同使要盟而可用則賣國背君亦可要也是故孔子舍蒲人之約而卒適衛子曰顔子之怒在物而不在已故不遷子曰仲尼之門不仕於大夫之家惟顔閔曾子數人而已或問小白子糾孰長子曰小白長何以知之子曰漢史不云乎齊桓殺其弟蓋古之傳者云爾有如子糾兄也管仲輔之為得正小白既奪其國而又殺之則管仲之與桓公乃不與同世之仇也若計其後功而與其事桓聖人之言無乃甚害於義而啓後世反復不忠之患乎子曰生而知之者謂理也義也若古今之故非學不能知也故孔子問禮樂訪官名而不害乎生知也禮樂官名其文制有舊非可鑿知而苟為者子曰人所不可能者聖人不為也或曰周公能為人臣所不能為陋哉斯言也子曰荀子謂博聞廣見可以取道欲力行堯舜之所行其所學皆外也子曰工尹商陽追吳師既及之而曰我朝不坐宴不與殺三人足以反命夫商陽惟當致力君命而乃行私情於其間慢莫甚焉孔子蓋不與也其曰殺人之中又有禮焉蓋記禮者之謬也子曰曾子易簀之際志於正而已矣無所慮也與行一不義殺一不辜而得天下不為者同心也子曰孔子之道得其傳者曾子而已矣時門弟子才辨明智之士非不衆也而傳聖人之道者乃質魯之人也觀易簀之事非幾於聖者不足以臻此繼其傳者有子思則可見矣劉安節問孔子未嘗以仁許人而稱管仲曰如其仁何也子曰闡幽之道也子路以管仲不死於子糾為未仁其言仲者小矣是以聖人推其有仁之功或抑或揚各有攸當聖人之言類如此學者自得可也子曰在邦家而無怨聖人發明仲弓使之知仁也然在家而有怨者焉舜是也在邦而有怨者焉周公是也子曰堯舜孔子語其聖則不異語其事功則有異子曰象憂喜舜亦憂喜天理人情之至也舜之於象周公之於管叔其用心一也管叔初未嘗有惡使周公逆度其兄將畔而不使是誠何心哉惟管叔之畔非周公所能知也則其過有所不免矣子曰齊王欲飬弟子以萬鍾使夫國人有所矜式其心善矣於孟子有可處之義也然時子以利誘孟子門人故孟子曰我非欲富也如其欲富則辭十萬而受萬乎故當知孟子非不肯為國人矜式者特不可以利誘耳子曰不已則無間天之道也純則不二文王之德也文王其猶天歟或問莊周何如子曰其學無禮無本然形容道理之言則亦有善者子曰世之博聞強識者衆矣其終未有不入於禪學者特立不惑子厚堯夫而已然其説之流亦未免於有弊也子曰瞻之在前未能及也忽焉在後則又過也其差甚微其失則有過不及之異是微也惟顔子知之故興卓爾之歎也或問後世有作虞帝弗可及何也子曰譬之於地肇開而種之其資育於物者如何其茂也久則漸磨矣虞舜當未開之時及其聰明如此其盛宜乎後世莫能及也胡不觀之有天地之盛衰有一時之盛衰有一月之盛衰有一辰之盛衰一國有幾家一家有幾人其榮枯休戚未有同者隂陽消長氣之不齊理之常也子曰知之既至其意自誠其心自正顔子有不善未嘗不知知之至也知之至是以未嘗復行有復行焉者知之不至耳子曰善惡皆天理謂之惡者或過或不及無非惡也楊墨之類是也明道十五六時周茂叔論聖道之要遂厭科舉慨然欲為道學而未知其方也及泛濫於諸家出入於釋老者幾十年反求諸六經而後得之明道志康節之墓曰先生少時自雄其才慷慨有大志既學力慕高逺謂先王之事為可必至及其學益老德益邵玩心高明觀天地運化隂陽消長以達乎萬物之變然後頽然乎順浩然乎歸德氣粹然望之可知其賢然不事表暴不設防畛正而不諒通而不汙清明坦夷洞徹中外其與人言必依於孝弟忠信樂道人之善而未嘗及其惡故賢者樂其德不肖者服其化所以厚風俗成人材之功亦多矣昔七十子學於仲尼其傳可見者惟曾子所以告子思而子思所以授孟子者耳其餘門人各以其才之所宜為學雖同尊聖人所因而入者門户則衆矣况後此千有餘嵗師道不立學者莫知所從來獨先生之學得之於李挺之挺之得之於穆伯長推其源流逺有端緒今李穆之言及其行事槩可見也而先生純一不雜汪洋高大乃其所自得者多矣然而名其學者豈所謂門户之衆各有所因而入者與語成德者昔難其居若先生之道以其所至而論之可謂安且成矣伯淳既沒公卿大夫議以明道先生號之子為之言曰周公死聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生千四百年之後得不傳之學於遺經天不憗遺哲人早世學者於道知所嚮然後見斯人之為功知所至然後見斯名之稱情山可夷谷可堙明道之名亘萬古而長存也君臣篇子曰人君欲附天下當顯明其道誠意以待物恕巳以及人發政施仁使四海蒙其惠澤可也若乃暴其小惠違道干譽欲致天下之親已則其道狹矣非特人君為然也臣之於君竭其忠誠致其才力用否在君而已不可阿諛逢迎以求君之厚已也雖朋友亦然修身誠意以待之疏戚在人而已不可巧言令色曲從苟合以求人之與己也雖鄉黨親戚亦然子曰君道以人心悅服為本子曰君臣朋友之際其合不正未有久而不離者故賢者順理而安行智者知幾而固守子曰君子有為於天下惟義而已不可則止無苟為亦無必為子曰止惡當於其微至盛而後禁則勞而有傷矣君惡既甚雖以聖人救之亦不免咈違也民惡既甚雖以聖人治之亦不免於刑戮也子曰人臣以忠信善道事其君者必達其所蔽而因其所明乃能入矣雖有所蔽亦有所明未有𡨕然而皆蔽者也古之善諌者必因君心所明而後見納是故訐直強果者其説多忤溫厚明辨者其説多行愛戚姬將易嫡庶是其所蔽也素重四老人之賢而不能致是其所明也四老人之力孰與夫公卿及天下之心其言之切孰與周昌叔孫通也高祖不從彼而從此者留侯不攻其蔽而救其明也趙王太后愛其少子長安君不使為質於齊是其蔽也愛之欲其富貴久長於齊是其所明也左師觸讋所以導之者亦因其明爾故其受命如響夫教人者亦如此而已子曰小人之於君能深奪其志未有由顯明以道合者子曰王者奉若天道動無非天者故稱天王命則天命也討則天討也盡天道者王道也後世以智力持天下者霸道也子曰人臣身居大位功蓋天下而民懷之則危疑之地也必也誠積於中動不違理威福不自已出人惟知有君而已然後位極而無逼上之嫌勢重而無專權之過斯可謂明哲君子矣周公孔明其人也郭子儀有再造社稷之功威震人主而上不疑之也亦其次歟張子厚再召如京師過子曰往終無補也不如退而間居講明道義以資後學猶之可也子曰何必然義當往則往義當來則來耳子曰剛健之臣事柔弱之君而不為矯飾之行者鮮矣夫上下之交不誠而以偽也其能久相有乎或問升卦有大臣之事乎子曰道何所不在曰大臣而猶升也則何之矣子曰上則升君於道下則升賢於朝已則止其分耳分則當止德則當升也盡是道者文王也子曰士有志在朝廷而才不足者有才可以濟而誠不至者誠苟至焉正色率下則用之天下治矣劉安節問賜魯天子禮樂以祀周公可乎子曰不可人臣而用天子之所用周公之法亂矣成王之賜伯禽之受皆過也王氏謂人臣有不能為之功而周公能之故賜以人臣不能用之禮樂非也人臣無不能為之功周公亦盡其分耳人臣所當為者而不為則誰為之也事親若曾子可也其孝非過乎子之分也亦免責而已臣之於君猶子之於父苟不盡其責之所當為則事業何自而立而謂人臣有不能為之功是猶曰人子有不能為之孝也而可乎後世有恃功責報而怏怏於君者必此之言夫子曰當為國之時既盡其防慮之道矣而猶不免則何也苟惟致其命安其然則危塞險難無足以動其心者行吾義而已斯可謂之君子子曰君子之處高位也有拯而無隨焉在下位也則有當拯有當隨焉或問為官僚而言事於長理直則不見從也則如之何子曰亦權其輕重而已事重於去則當去事輕於去則當留事大於爭則當爭事小於爭則當已雖然今之仕於官者其有能去者必有之矣而吾未之見也范公為諫官嘗諫上曰今欲富國強兵將何以為子聞之曰野哉烏足以格其君周禮所記亦有強富之術惟孟子為梁惠王言利之不可為至於不奪不饜言兵之不可用至於及其所愛也庶乎其可矣子曰凡諫説於君論辨於人理勝則事明氣忿則招拂子曰臣賢於君則輔君以所不能伊尹之於太甲周公之於成王孔明之於劉禪是也臣不及君則贊助之而已子曰君子之事君也不得其心則盡其誠以感發其志而已誠積而動則雖昏蒙可開也雖柔弱可輔也雖不正可正也古之人事庸君常主而克行其道者以已誠上達而其君信之之篤耳管仲之相桓公孔明之輔後主是也或問陳平當王諸吕時何不諫曰王陵廷爭不從則去其位平自意復諫者未必不激吕氏之怒也夫漢初君臣徒以智力相勝勝者為君其臣之者非心悅而臣事之也當王諸吕時而責平等以死節庸肯苟死乎子曰士方在下自進而干君未有信而用之者也古之君子必待上致敬盡禮而後往者非欲崇巳以為大也蓋尊德樂道之誠心不如是不足與有為耳或謂屯之九五曰屯其膏然則人君亦有屯乎子曰非謂其名位有損也號令有所不行德澤有所不下威權去已而不識所收如魯昭公高貴鄉公是也或不勝其忿起而驟正之則致凶之道其惟盤庚周宣乎修德用賢追先王之政而諸侯復朝焉蓋以道馴致不以暴為之也若唐之僖宗昭宗是也恬然不為至於屯極則有亡而已昔有典選其子當遷官而固不之遷者其心本自以為公而不知乃所以為私也或曰古者直道而行於嫌有所不必避後世人偽競生是以不免耳子曰非無時也時者人之所為蓋無其人耳子曰擇才而用雖在君以身許國則在已道合而後進得正則吉矣汲汲以求遇者終必自失非君子自重之道也故伊尹武侯救世之心非不切必待禮而後出者以此子曰事君者知人主不當自聖則不為諂諛之言知人臣義無私交則不為阿黨之計或問臣子加諡於君父當極其美有諸曰正終大事也加君父以不正之諡知忠孝者不為也子曰人臣之義位愈高而思所以報國者當愈勤飢則為用飽則飛去是以鷹犬自期也曾是之謂愛身乎或謂禮局設官地清而職間可居也子曰朝廷舉動有一違禮則禮官當任其責安得謂之間或曰未有大臣如介甫得君者子曰介甫自知之其求去自表於上曰忠不足取信事事待於自明使君臣之契果深而有是言乎子曰君貴明不貴察臣貴正不貴權子曰君子不輕天下而重其身不輕其身而重天下凡為其所當為不為其所不可為者而已或問孔子事君盡禮而人以為諂禮與諂異矣諂何疑於盡禮子曰當時事君者於禮不能盡也故以譏聖人非孔子而言必曰小人以為諂也孔子曰人以為諂而已聖人道大德宏故其言如此子進講至南容三復白圭中侍謂講至南字請隱之子不聽講畢進曰人君居兆人之上處天下之尊只懼怕人過為崇奉以生驕慢之心此皆進習諂媚以飬之耳昔仁宗之世宫嬪謂正月為初月易蒸餅曰炊餅皆此類天下至今以為非嫌名舊名請勿復諱也翼日孫覺講曰子畏於正子曰以諱之故獨無地名可稱也謂畏於正此何義也司馬溫公吕申公韓康公上子行義於朝遂命以官典西都之教子辭不聽又辭曰上嗣位之初方圖大治首拔一人於畎畝之中宜得英材使天下聳動知朝廷之急賢也今乃官使庸常之人則天下何望後世何觀朝廷之舉何為臣之受也何義臣雖至愚敢貪寵祿以速戾於厥躬是以罔虞刑威而必盡其説願陛下廣知人之明以照四方充取臣之心以求真賢求之以其方待之以其道雖聖賢亦將為陛下出矣况如臣者何足道哉又不聽而召之至京師且使校讐館閣子以布衣造朝也則曰草萊之臣蒙召而至未見君先受命非禮也既見於廷又命之陛對遂有講筵之除子退而上疏曰知人則哲堯舜所難臣進對於頃刻之間陛下見臣何者而遽加擢任也今之用臣蓋非常之舉必將責其報效此天下之所觀聽也苟或不然則失望於今而貽笑於後可不謹哉臣請有所言焉古之人君守成業而致盛治者莫如周成王其所以成德則由乎周公周公之輔成王也幼而習之所見必正事所聞必正言左右前後皆正人故習與性長化與心成今陛下春秋方富輔飬之道不可不至也所謂輔飬之道非謂告詔以言過而後諫也尤在涵飬薰陶之而已矣今夫一日之間接賢士大夫之時多親寺人宦官之時少則氣質自化德器自成臣欲謹選賢德之士以侍勸講講讀既罷常留以偹訪問從容燕語不獨漸摩德義至於人情物態稼穡艱難日積既久自然通達比之深處宫闈為益多矣夫傅德義者在乎防聞見之非節嗜欲之過保身體者在乎適起居之冝存畏謹之心故左右近侍冝選老成重厚小心之人服飾器用皆須朴實之物俾華巧靡麗不至於前淺俗之言不入於耳凡動作言語必使勸講者知之庶幾隨事針規應時諫正調護聖躬莫過乎此矣人君居崇高之位持威福之柄百官畏懼而莫敢仰視萬方崇奉而所欲必得苟非知道畏義所飬如此其成則中常之君無不驕肆英明之主自然滿假此古今同患治亂所由也所以周公告成王稱前王之德以寅畏祗懼為首云夫儒者得以經術進説於人君言聽則志行自昔抱道之士孰不願之顧恨弗獲然自古君臣道合靡不由至誠感通信以發志臣也道未行於室家善未孚於鄉黨而何足以動人主之心乎苟不度其誠之未至而姑善辭説於進退之間為一時之觀則可矣必欲通于神明光于四海久而無斁臣知其不可也是以欲進而思義喜時以愧已夫海宇至廣賢俊非一人願博謀羣臣旁加收擇期得出類之賢置諸左右輔成聖德則為宗社生靈之福矣久之意有不合上書太后曰臣鄙人也少不喜進取以讀書求道為事于兹幾三十年昔在兩朝纍為當塗者薦揚臣於是時自顧道學之不足不願仕也及上嗣位陛下臨朝大臣仰體求賢願治之心搜揚巖穴首及微臣以為召而不往子思孟軻則可蓋二人者處賔師之位不往所以規其君也如臣微賤食土之毛而為王民召而不至則邦有常憲矣是以奔走承命甫至闕庭之外又有館職之除方且表辭遂蒙賜對臣於是時尚未有意於仕也進至簾陛咫尺天光未嘗一言及於朝政陛下視臣豈求進者哉既而親奉玉音擢置經筵事出望外惘然驚惕臣於斯時雖以不才而辭然許國之心已萌矣辭不獲命於是服勤厥職夫性朴而言拙臣之所短也若夫愛上之心事上之禮告上之道則不敢不盡也陛下心存至公躬行大道開納忠言委用耆德直欲舉太平不止於因循苟安而已苟能日謹一日天下之事誠不足慮而方今所謂至急為長久之計則莫若輔飬上德歷觀前古成就幼主莫偹於周公為萬世之法願陛下擴高世之見以聖人之言為必可信以先王之道為必可行勿狃滯於近規勿遷惑於衆口然後知周公誠不我欺也考之立政之書其言常伯常任之尊與綴衣虎賁之賤同以為戒要在得人以為知恤者鮮也終篇反覆惟此一事而已夫僕臣正厥后克聖左右侍御僕從罔匪正人旦夕承弼然後起居出入無違禮也發號施令無不善也後世不復知此以為人主就學所以涉書史覽古今也夫此一端而已苟曰如是而足則能文宫人可以備勸講知書內侍可以充輔導又何必置官設職求賢德之士哉自古帝王才質鮮不過人然完德有道之君至少其故何哉皆輔飬不得其道而勢位使之然也臣服職以來六侍經筵但見諸臣拱手默坐當講説者竦立案傍解釋數行則已肅退如此雖彌年積嵗所益幾何也亦已異於周公輔成王之道矣或以為上方沖幼宜爾者不知本之論也古之人自能食能言而教之是故大學之法以豫為先蓋人之幼也智愚未有所主則當以格言至論日陳於前盈耳充腹久自安習若固有之者日復一日雖有讒説搖惑不能入也若為之不豫及乎稍長私慮偏好生於內衆口辨言鑠於外欲其純全不可得已故所急在先而不憂其太早也或又曰聖上天資至美自無違道則尤非也莫聖於禹而益以丹朱傲遊慢虐為之戒禹豈不知是也以唐太宗之聰睿躬歷艱難力平禍亂年亦長矣其始也惡隋焬帝之侈麗毁其層觀未六五年乃欲治乾陽殿矣人心奚常之有所以聖賢處崇高之位當盛明之際不忘規戒為慮至深遠也况幼沖之君而可懈於間邪拂違之道乎夫開發之道有方而明習之益至切夫學悅而後入宜使上心泰而體舒然後有所悅懌今也前對大臣動虞違謬一言之出史必書之非所以遜人主之志而樂於學也凡侍講讀皆使兼視他職比於輔導則弗專矣夫告於人者非積其誠意則不能感發古人以蒲盧喻教謂以誠化也今夫鐘怒而擊之則聲武悲而擊之則聲哀誠意之入也其於人亦猶是矣若使營營於職事紛紛於心思及至上前然後責功於簡册望化於頰舌不亦淺乎道衰學廢世不得聞此言也久矣雖聞之必笑之以為迂且誕也陛下高識逺見當蒙鑒采聖學不傳臣幸得之於遺經不自量度方且區區駕其説於學以示天下後世不虞幸會得備講説於人主之側誠使臣得以所學上沃帝聰則聖人之道有可行之望豈特臣之幸哉神宗首召伯淳首訪致治之要子對曰君道稽古正學明善惡之歸辨忠邪之分曉然趨道之至正君志定而天下之治成矣上曰定志之道何如子對曰正心誠意擇善而固執之也夫義理不先定則多聽而易惑志意不先定則守善而或移必也以聖人之訓為必當從以先王之治為必可法不為後世駁雜之政所牽滯不為流俗因循之論所遷改信道極於篤自知極於明去邪勿疑任賢勿二必期致治如三代之隆而後已也然患常生於忽微而治亦戒乎漸習故古之人君雖從容燕間必有誦訓針諫左右前後罔匪正人輔成德業臣願尊禮老成訪求儒學之士不必勞以官職俾日親便坐講論道義又博延俊彥陪侍法從朝夕延見講磨治體則睿治益明王猷允塞矣今四海靡靡日益偷薄末俗嘵嘵無復亷耻蓋亦尊德樂義之風未孚而篤誠忠厚之化尚鬱也惟陛下稽聖人之訓法先王之治體乾剛健而力行之則天下之幸上嘉納焉明道告神宗曰人君當防未萌之欲上拱手前坐曰當為卿戒之因論人才上曰朕未之見也曰陛下奈何輕天下士上聳然曰朕不敢明道之未為臺諫也察荆公已信用矣明道每進見必陳君道以至誠仁愛為本未嘗一言及功利上始疑其迂濶而禮貌不少替也一日極論治道上斂容謝曰此堯舜之事也朕何敢當明道愀然曰陛下此言非天下之福上益敬之荆公畫䇿寖行子意多不合令出有不便者即論奏之其尤有益則論大臣不同心謂小臣預大計謂青苗收二分之息謂鬻祠部度牒良民為僧謂民情怨咨而公論壅遏謂興利之臣日進而尚德之風寖衰上不敢用子遂以罪去明道補外官入辭上猶眷眷問政他日明道曰當是時吾不能感動君心顧吾學未至德未成也雖然河濵之人捧土塞孟津亦復可笑人力不勝以至於今豈非命哉心性篇劉安節問心有限量乎曰天下無性外之物以有限量之形氣用之不以其道安能廣大其心也心則性也在天為命在人為性所主為心實一道也通乎道則何限量之有必曰有限量是性外有物乎子曰耳目能視聽而不能逺者氣有限也心無逺近子曰占出於自然之理聲發於自然之氣聽聲者知其資之善惡善卜者知其人之姓氏是一道也子曰論性而不及氣則不偹論氣而不及性則不明子曰沖漠無朕而萬象森然未應不為先已應不為後如百尋之木本根枝葉則一氣也若曰高明之極無形可見必也形諸軌轍之間非也高明之極軌轍之間皆一貫耳子曰見聞之知乃物交而知非德性所知德性所知不待於聞見子曰告子言生之謂性通人物而言之也孟子道性善極本原而語之也生之謂性其言是也然人有人之性物有物之性牛有牛之性馬有馬之性而告子一之則不可也使孟子不深問告子不嗣説烏知告子之未知義孟子為知言子曰凡物既散則盡未有能復歸本原之地也造化不窮蓋生氣也近取諸身於出入息氣見闔闢往來之理呼氣既往往則不返非吸既往之氣而後為呼也或問性與天道是誠不可得而聞乎子曰可自得之而不可以言傳也他日謝良佐曰子貢即夫子之文章而知性與天道矣使其不聞又安能言之夫子可謂善言子貢可謂善聽子曰人心必有所止無止則聽於物惟物之聽何所往而不妄也或曰心在我既已入於妄矣將誰使之子曰心實使之子曰視聽言動身之用也由中而應乎外制乎外所以飬其中也子曰心本至虛必應物無迹也蔽交於前其中則遷故視聽言動必復於理制於外所以安其中也久則誠矣張子曰性通極於無氣其一物耳命同稟於性遇其適然耳力行不至難以語性可以言氣行同報異難以語命可以言遇也或問命與遇異乎子曰遇不遇即命也曰長平死者四十萬其命齊乎子曰遇白起則命也有如四海九州之人同日而死也則亦常事爾世之人以為是駭然耳所見少也或問韓文公揚雄言性如何子曰其所言者才耳或問盡心之道豈謂有惻隱之心而盡乎惻隱有羞惡之心而盡乎羞惡也哉子曰盡則無不盡苟一一而盡之烏乎而能盡韓侍郎曰凡人視聽言動不免幻妄者蓋性之不善也子哂之曰謂性不善者則求一善性而易之可乎子曰君子慮及天下後世而不止乎一身者窮理而不盡性也小人以一朝之忿曾身之不遑恤非其性之盡也子曰天人無二不必以合言性無內外不可以分語子曰理與心一而人不能會為一者有已則喜自私私則萬殊冝其難一也子曰氣質沉靜於受學為易子曰志御氣則治氣役志則亂人忿欲勝志者有矣以義理勝氣者鮮矣王介甫曰因物之性而生之直內之敬也成物之形而不可易方外之義也子曰信斯言也是物先有性然後坤因而生之則可乎子曰動以人則妄動以天則無妄子曰言愈多於道未必明故言以簡為貴子曰不知性善不可以言學知性之善而以忠信為本是曰先立乎其大者也或曰窮理智之事也盡性仁之事也至於命聖人之事也子曰不然也誠窮理則性命皆在是蓋立言之勢不得不云爾也子曰有為不善於我之側而我不見有言善事於我之側而我聞之者敬也心主於一也或曰惟閉目靜坐為可以飬心子曰豈其然乎有心於息慮則思慮不可息矣子曰人之知識未嘗不全其蒙者猶寐也呼而覺之斯不蒙矣子曰有得無得於其心氣驗之裕然而無不充悅者實有得也切切然心勞而氣耗謂已有得皆揣度而知之者也子曰所守不約則泛然而無功約莫如敬子曰守之必嚴執之必定少怠而縱之則存者亡矣子曰義理客氣相為消長者也以其消長多寡而君子小人之分曰以相逺矣子曰公則同私則異同者天心也或問人有耻不能之心可乎子曰耻不能而為之可也耻不能而隱之不可也至於疾人之能又大不可也若夫小道曲藝雖不能焉君子不耻也或問君子存之何所存也子曰存天理也天理未嘗亡而庶民則亡之者衆矣或問志乎道而玩之不樂居之不安何也子曰毋乃助之長歟子曰人莫不知命之不可遷也臨患難而能不懼處貧賤而能不變視富貴而能不慕者吾未見其人也或問敬忠孚信之别子曰一心之謂敬盡心之謂忠存之於中之謂孚見之於事之謂信子曰自得而動者猶以手舉物無不從也慮而後動者猶以物取物有中有不中矣或問人性本明其有蔽何也子曰性無不善其偏蔽者由氣稟清濁之不齊也子曰德性云者言性可貴也性之德言性所有也張子曰太虛至清清則無礙無礙故神反清則濁濁則有礙礙則形窒矣子曰神氣相極周而無餘謂氣外有神神外有氣是兩之也清者為神濁者何獨非神乎或問獨處夜行而多懼心何也子曰燭理不明也明理則知所懼者皆妄又何懼矣知其妄而猶不免者氣不充也敬不足也子曰以私已為心者枉道拂理諂曲邪侫無所不至不仁孰甚焉子曰盡性至命必本於孝弟窮神知化由通於禮樂劉安節問曰孝弟之行何以能盡性至命也子曰世之言道者以性命為高遠孝弟為切近而不知其一統道無本末精粗之别灑掃應對形而上者在焉世豈無孝弟之人而不能盡心至命者亦由之而弗知也人見禮樂壞崩則曰禮樂亡矣然未嘗亡也夫盜賊人之至不足道者也必有統屬必有聽順然後能羣起而謂禮樂一日亡可乎禮樂無所不在而未嘗亡也則於窮神知化乎何有子曰未有不能體道而能無思者故坐忘則坐馳有忘之心是則思而已矣或問性之成形猶金之為器歟子曰氣比之金可也不可以比性子曰言不足以得意得意則言可忘矣非心自得之終非已物子曰泛乎其思之不如守約思則來捨則去思之弗熟也子曰天德云者謂所受於天者未嘗不全也苟無汚壞則直行之耳或有汚壞則敬以復之耳其不必治而修則不治而修義也其必治而修則治而修亦義也其全天德一也或問性善而情不善乎子曰情者性之動也要歸之正而已亦何得以不善名之子曰受於天之謂性稟於氣之謂才才有善否由氣稟有偏正也性則無不善能飬其氣以復其正則才亦無不善矣或問赤子之心與聖人之心何以異子曰赤子之心已發發而去道未遠也聖人之心如明鏡如止水或問志意之别子曰志自所存主言之發則意也發而當理也發而不當私也子曰𢎞而不毅則難立毅而不𢎞則無以居之楊迪言於子曰心迹固夫子以為無可判之理迪也疑焉子曰然則舜同象之憂喜孟子不以為偽即是宜精思以得之而何易言也子曰與叔昔者之學雜故常以思慮紛擾為患而今也求所以虛而靜之遂以飬氣為有助也夫養氣之道非稿形灰心之謂也人者生物也不能不動而欲稿其形不能不思而欲灰其心心灰而形稿則是死而已也其從事於敬以直內所患則亡矣遊酢曰能戒謹於不覩不聞之中則上天之載可循序而進矣子曰是則然矣雖然其序如之何循之又如何也荀卿曰始乎為士終也為聖其言是也而曰性者惡也禮者偽也然則由士而聖人者彼亦不知其所循之序矣可不深思而謹擇乎子曰有能全體此心學雖未盡但隨分以應事物雖不中不遠矣子曰西北與東南人材不同氣之厚薄異也或問心有存亡乎子曰以心無形體也自操舍言之耳夫心之所存一主乎事則在此矣子因以目視地曰過則無聲臭矣其曰放心者謂心本善而流於不善是放也心則無存亡矣子曰佛者平居高談自謂見性得盡至其應物處事則有惘然不知者是實未盡所得也或問有言求中於喜怒哀樂未發之前何也子曰求則是有思也思則是已發也然則何所據依何以用功哉子曰存飬而已矣及其久也喜怒哀樂之發不期中而自中矣子曰不欲則不惑惑者由有所欲也欲非必盤樂也心有所向無非欲也或曰心未有所感之時何所寓也子曰莫知其鄉何為而求所寓有寓非所以言心也惟敬以操之而已子曰邪説雖熾終不能勝正道以人之秉彛不可亡也然亦惡其善惑人心是以孟子欲正人心息邪説子曰人必有仁義之心然後仁義之氣睟然達於外子曰善惡云云者猶杞桞之論也善惡混云者猶湍水之説也子曰人性果惡耶則聖人何為能反其性以至於斯也子曰命受於天或者服餌致壽是天命而可增益也子曰卜筮將以決疑也今之人獨計其一身之窮通而已非惑夫子曰君子以識為本行次焉今有人力能行之而識不足以知之則有異端之惑將流蕩而不知反好惡失其宜是非亂其真雖有尾生之信曾子之孝吾弗貴也子厚曰必有事焉而勿正心弗忘勿助長者其入神之奧乎學者欲以思慮求之既以自纍其心於不神矣烏得而求之哉子曰有所事乃有思也無思則無事矣孟子於是論飬氣之道而未遽及夫神也子厚曰勿忘者亦不捨其靈明善應之耳子曰存不捨之心安得謂之靈明然則其能善乎子曰意必固我既亡之後必有事焉此學者所宜盡心也子曰夜氣之所存者良知也良能也苟擴而充之化旦晝之所梏為夜氣之所存然後有以至於聖人也子曰甚矣欲之害人也人為不善欲誘之也誘之而不知則至於滅天理而不知反故目則欲色耳則欲聲鼻則欲香口則欲味體則欲安此皆有以使之也然則何以窒其欲曰思而已矣覺莫要於思惟思為能窒欲子曰自性得者皆善也而有仁義禮智之名者以其所施之不同合而言之一道也舍而行之是悖理而違道也而世言道與性者必曰超然渺乎四端之外是亦不學之過也子曰聞見之知非德性之知德性所知不假聞見子曰世之人樂其所不當樂不樂其所當樂慕其所不當慕不慕其所當慕皆由不思輕重之分不知求放心而求放雞犬者也子曰有一物而相離者如形無影不害其成形水無波不害其為水有兩物而必相須者心無目不能視目無心不能識也子曰莫大於性小人云者非其性然也自溺於小而已是故聖人閔之子曰人之性猶器受光於日佛氏言性猶置器日下傾此於彼耳日固未嘗動也子曰心具天德心有不盡則於天德不盡其於知天難矣子曰真元之氣氣所由生外物之氣不得以雜之然必資物之氣而後可以飬元氣本一氣也人居天地一氣之中猶魚之在水飲食之真味寒暑之節宣皆外氣涵飬之道也子曰神與氣未嘗相離不以生存不以死亡而佛言有一物不亡而常存能盜胎奪蔭則無是理也子曰不誠不莊而曰盡性者無之性之德無偽慢不免乎偽慢者未嘗知其性也子曰體會必以心謂體會非心於是有心小性大之説聖人之心與天為一或者滯心於智識之間故自見其小耳或問克伐怨欲不行而非仁何也子曰無是四者非仁而何原憲之問在於止而不行未免於有是心也故曰可以為難而已蓋將以起原憲之問而進之而憲不能也或問君子存之如何其存也子曰必有事焉而勿正心勿忘勿助長乃存之之道也子曰無妄天性也萬物各得其性一毫不加損矣子曰感而遂通感非自外也子曰退藏於密者用之源也子曰人心私欲也危而不安道心天理也微而難得惟其如是所以貴於精一也精之一之然後能執其中中者極至之謂也子曰鳶飛戾天魚躍於淵言其上下察也此子思開示學者切要之語也孟子曰必有事焉而勿正心勿忘其意亦猶是也有得於此者樂則生生則烏可已也無得於此者役役於見聞知思為機變之巧而已子曰知命者達理也受命者得其應也天之應若影響然得其應者常理也致微而觀之未有不應者自淺狹之所見則謂其有差矣天命可易乎然有可易者惟其有德者能之韓康公曰今有人頓然明盡者子信諸子曰必也生而知之然未之見也凡所貴乎學者不謂生而知之者也孟子曰盡其心者知其性也存其心飬其性所以事天也言其至也佛氏於隂陽生死古今未之識也而謂得夫形而上者與吾聖人無二致可乎人才智愈明其所陷溺愈深可不戒乎子曰學必知自慊之道有一毫不自慊則子厚所謂有外之心不足以合天心也子曰帥氣在志養氣在直內有私意則餒無不義則浩然子曰心活則周流無窮而不滯於一隅子曰質之美者一明即盡濁滓渾化斯與天地同體矣莊敬持養抑其次也及其至則一也或問多怒多驚何也子曰主心不定也子曰心盡乎智周萬物而不盡乎如死灰形盡乎動容周旋而不盡乎如稿木以寂滅湛靜為道者其分逺矣張子厚問伯淳曰定性未能不動猶纍於外物何也子曰所謂定者靜亦定動亦定無將迎無內外苟以物為外牽已而從之是以性為有內外也性為隨於外則當其在外時何者在內也是有意於絶外誘而不知性之無內外也既以內外為二本則又烏可語定哉夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應苟規規於外誘之除將見滅於東生於西也非其日之不足顧其端無窮不可得而除也人之情各有所蔽故不能適道其害在於是內而自私也用智也自私則不能以有為為應迹用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也與其非外而是內不若內外之兩忘也兩忘則澄然無事矣無事則定定則明明則何物之為纍哉聖人之喜以物之當喜聖人之怒以物之當怒喜怒不繫於心而繫於物聖人未嘗絶物而不應也人之情易發而難制者惟怒為甚能以方怒之時遽忘怒心而觀理之是非亦可見外誘之不足惡而於道亦思過半矣人物篇子曰萬物之始氣化而已既形氣相禪則形化長而氣化消子曰人以纍物為患必以忘物為賢其失一也子曰物固有是理因而充長之不俟乎造為故曰益長裕而不設設則偽矣子曰觀物理以察已之理明則無往而不識矣子曰君子循理故常泰小人役於物故多憂戚子曰時者聖人之所不能為也而人之智愚世之治亂聖人必示以可易之道者豈徒為教哉蓋有其理也子曰物形有小大精粗之不同神則一而已子曰物相入則相説説則相入説以正為貴君子之道致説於民如天地之施焉子曰君子之自尚蓋非一致有抱道不偶而高潔自守者焉有知止足之戒退而保身者焉有量能度分安於不求者焉有清介逺引不屑世故者焉孔子所謂志則可者進退合道者也子曰二氣五行剛柔萬殊聖人由一理復其初也子曰非仁無以見天地子曰感慨殺身常人之所易處死生之際雍容就義君子之所難子曰觀物於靜中皆有春意子曰聖賢之處世莫不如大同之中有不同焉不能大同者是亂常拂理而已不能不同者是隨俗習汚而已子曰一行非所以名聖人子曰有志之士不以天下萬物撓己巳立矣則運天下濟萬物必有餘裕或曰凡人辨論自直其説求勝人而無含容之氣何也子曰識量狹也聖人之有量天資也君子之有量學識也聖人與日月並明故天地同量下此者猶之江海也鐘鼎也釜斛也斗筲也其涯雖異其受也不齊而未有不滿者也惟道無限量知道者量必宏學而充之則亦隨其知之所至而已人有受一薦而滿者有得一官而滿者推而上之至於為公輔而滿者方其未滿猶可蔽也既不能承則必盈溢不可掩也鄧艾位登三公年七十矣其自處亦善及破蜀有功則心動矣謝安聞苻堅之敗不形喜色及折屐齒則心動矣有飲酒既醉而執禮愈恭者雖賢於顚沛而為酒所動一也富貴公子折身過於謙抑視驕傲者亦賢矣亦為富貴所動也或問視朋友之過不告則不忠善告之不聽則當何如子曰誠意交孚於未言之前雖不言而人信之矣不信者誠不至也子曰匹夫悍卒見難而能死者多矣惟妻孥之牽情欲之愛能斷而不惑者鮮矣哉子曰勇一也而用不同勇於氣者小人也勇於義者君子也劉安節問人有少而勇老而怯少而亷老而貪何為其然也子曰志不立為氣所使故也志勝氣則一定而不可變也曾子易簀之際其氣微可知也惟其志既堅則雖死生之際亦不為之動况老少之異乎子曰以已及物仁也推已及物恕也子曰天下之聚貴以正聚不以正於人則為苟合於財則為悖入子曰學者必識聖賢之體聖人猶化工也賢人猶巧工也剪綵以為花設色以畫之非不宛然肖之而欲觀生意之自然則無之也子曰不以已待物而以物待物是謂無我子曰聖人之明猶日月不可過也過則不明矣子曰一介之士苟存心於愛物亦必有所濟子曰氣之所鍾有偏正故有人物之殊有清濁故有智愚之等劉安節問太古之時人物同生子曰然純氣為人繁氣為物乎子曰然其所生也無所從受則氣之所化乎子曰然子曰物窮而不變則無不易之理易者變而不窮也子曰萬物始生也鬱結未通則實塞于天地之間至於暢茂則塞意亡矣子曰哲人知幾誠之於思乎志士力行守之於為乎順理則裕而從欲則危乎子曰君子之教人或引之或拒之或各因所虧者成之而已張子曰洪鐘未嘗有聲由叩乃有聲聖人未嘗有知由問乃有知子曰謂聖人無知則當不問之時其猶木石乎張子曰有不知則有知無不知則無知故曰聖人未嘗有知由問乃有知也或問天民與大人之道何以異子曰順天而行道者天民也順天而為政者天吏也大人則進乎此矣子曰君子處難貴守正而不知其他也守正而難不解則命也遇難而不固其守以自放於邪濫雖使苟免斯亦惡德也知義命不為也子曰先儒母弟之説非也禮云立嫡子母弟者謂嫡也非以同母為加親也以同母為加親是知母而不知父非人道也子曰聖人之德無所不盛古之稱聖人者自其尤盛而言之尤盛者見于所遇也而或以為聖人有能有不能非知聖人者也子曰厚責於吾所感薄責於吾所應惟君子能之子曰聖人責人緩而不迫事正則已矣或問君子之與小人處也必有侵陵困辱之患則如之何曰於是而能反已兢謹以逺其禍則德益進矣詩不曰他山之石可以攻玉子曰人各親其親然後能不獨親其親子曰君子常過於厚小人常過於薄君子常過於愛小人常過於忍子曰欲利已者必損人欲利財者必斂怨子曰今之世稱曰善人者豈如無惡可欲也哉殆亦昏棄無立之異名子曰聖人之心未嘗有在亦無不在蓋其道合內外體萬物子曰聖人之心雖當憂勞未嘗不安靜其在安靜亦有至憂而未嘗勞也子曰萬物之理皆至足而人於君臣父子之間不能盡其分者多矣子曰無物無理惟格物可以盡理或問聖人之道其難知也子曰聖人未嘗言易以驕人之志亦未嘗言難以阻人之進蓋曰未之思也夫何逺之有是言也涵蓄無窮之旨學者宜深思也子曰羈靮以御馬而不以制牛人皆知羈靮之制在人而不知羈靮之用本於馬也聖人之化亦如之子曰君子之道貴乎有成有濟物之用而未及乎物猶無有也子曰天地萬物之理無獨必有對子曰聖人天地之用也子曰聖人盡道以其身之所行者教人是欲天下之人皆至於聖人之域也佛氏逃父棄家毁絶倫類獨處山林之下乃以所輕所賤者施諸人豈聖人君子之心哉子曰凡物有形則聲色臭味具焉四者之虛實均而實勝也意言數象亦然子曰夢之所接無形聲而心所感通則有形聲之理物生者氣聚也物死者氣散也子曰君子在蹇則有以處蹇在困則有以處困道無時而不可行也不以蹇而蹇困而困也子曰元者物之先也物之先未有不善者成而後有敗興而後有衰得而後有失事無不然者故孔子贊之曰元者善之長也子曰凡人有已必用才聖人忘已何才之足言或問符瑞之事有諸子曰有之聖人不道焉何也曰因災異而修德則無損因禎祥而自恃則有害是以不道也子曰堯夫云能物物則我為物之人也不能物物則我為物之物也夫人自人物自物其理昭矣子曰合而生非來也盡而死非往也然而精氣歸於天形魄歸於地謂之往亦可矣子曰與昧者語如持掖醉人左扶之則右仆右扶之則左仆欲其卓立中途不可得也子曰莊周言神人者非也聖而不可知則不可得而名故以神稱之非謂神人加於聖人一等也子嘗言昔遊乎雍華之間關西學者六七人從豫行一曰亡千錢僕者曰非晨裝遺必涉水沉之矣子曰惜哉有謂子曰是誠可惜也又有曰微哉千錢亦何足惜也又有曰水中囊中人亡人得可以一視何歎何惜也子曰人苟得之則非亡矣今乃墜諸水則無用吾是以歎之及語吕與叔曰人之器識乃如是之不同也與叔曰夫三子之言何如子曰最後者善與叔曰善則善矣觀夫子之言則見其有體而無用也豫因善志之既十有五年閲故編見之思與叔不幸而早死為之隕涕子曰君子之學必日進則日新不日進者必日退未有不進而不退者惟聖人之道無進退以其所造者極也子曰聖人之言其逺如天若不可階而升也其近若地則亦可以履而行也子曰有求為聖人之志然後可以共學學而善思然後可以適道子曰多權者害誠好功者害義取名者賊心子曰君子好成物故吉小人好敗物故凶子曰萬物皆備于我心與事遇則內之所重者更互而見此一事重則此一事出惟能物各付物則無不可矣子曰為有為而以無為為之是乃有為耳聖人無為異於是子曰元氣會則生聖賢子曰凡物參合交感則生離散不和則死子曰君子之於義猶小人之於利也唯其深喻是以篤好子曰聖人濟物之心無窮而力或有所不及子曰聚為精氣散為遊魂聚則為物散則為變觀聚散則鬼神之情狀著矣萬物之始終不越聚散而已鬼神者造化之功也子曰才高者多過過則一出焉一入焉才卑者多不及不及者殆且弛矣或曰凡物之出各自其氣之所勝而化焉子曰何以見之曰如木之生新根既大則舊根化矣子曰是克也或曰克則木化為土而何子曰非化也克也物無一定盛衰相因古之人以迭王言五行盡之矣或曰五行一氣也其本一物耳子曰五物也五物備然後生猶五常一道也無五則亦無道然而既曰五矣則不可渾而為一也子曰物有本末而本末非二道也子曰致中和天地位焉萬物育焉曰致曰位非聖人不能言子思蓋得之云爾子曰聖人無私無我故功高天下而無一介纍其心蓋有一介存焉未免乎私已也子曰聖人之心如天地之造生養萬物而不尸其功應物而見於彼復何存於此乎子曰輕浮巧利之人去仁逺矣子曰天理無私一入於私雖欲善其言行皆非禮子曰不履聖賢之行則亦不能入其閫奧子曰不可為而為之聖人無忘天下之心也子曰隘與不恭君子不由拔本塞源之教也子曰因是人有可喜則喜之聖人之心本無喜也因是人有可怒則怒之聖人之心本無怒也譬諸明鏡誠懸美物至則美醜物至則醜鏡何有美醜哉君子役物小人役於物今人見可喜可怒之事必容心其間若不啻在已者亦勞矣子曰上下一於敬則天地自位萬物自育氣無不和四靈何所不至此聖人修已以安百姓之道也子曰為惡之人原於不知思有思則心悟子曰物未嘗不齊也強欲齊之者非物不齊也汝自不齊耳子曰上竿而戲者自數尺至於百尺習化其高也况聖人至誠妙物之功乎子曰聖人一言即全體用不期然而然也子曰人之所以為人者以有天理也天理之不存則與禽獸何異矣或問於傳有言太古之時人有牛頭蛇身者信乎子曰謂之人則無是矣或言其賦形之有肖焉則可謂云爾已矣子曰物我一理明此則盡彼盡則通此合內外之道也語其大至天地之所以高厚語其小至於一草木所以始終皆窮理之功也子曰窮物理者窮其所以然也天之高地之厚鬼神之微顯必有所以然者苟曰天惟高耳地惟厚耳鬼神惟微顯耳是則辭而已尚何有哉子曰惟聖人凝然不動子曰惟聖人善通變子曰五行在天地之間有則俱有無生出先後之次也或水火金木土之五者為有序不可也然則精神魂魄意之五者為序亦不可也二程粹言卷下
