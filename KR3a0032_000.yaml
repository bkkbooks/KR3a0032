body:
  text: 二程粹言目録儒家類卷上論道篇論學篇論書篇論政篇論事篇卷下天地篇聖賢篇君臣篇心性篇人物篇臣等謹案二程粹言二卷宋楊時編時字中立南劔將樂人熙寧九年進士官至國子祭酒髙宗即位除工部侍郎兼侍讀以龍圖閣直學士提舉杭州洞霄宫卒諡文靖事蹟具宋史本傳時始以師禮見明道於潁昌相得甚歡明道沒又見伊川於洛東南學者推為程氏正宗南渡以後士大夫知崇尚正學而朱子及張栻等得程氏之傳其源委脉絡皆出於時是書乃其自洛歸閩時以二程子門人所記師說採掇編次分為十篇朱子嘗稱明道之言發明極致善開發人伊川之言即事明理尤耐咀嚼皆足與六經語孟相為發明然當時記録既多如遺書外書雅言師說雜說之類卷帙浩繁讀者不能驟窺其要又所載多有龎雜朱子嘗欲刪訂為節本而未就張栻有伊川粹言不及明道又未免於闕略時師事二程親承指授為此書以綜其緒論使內聖外王之學條理秩然洵擇之精而語之詳學者玩其辭㫖於二程之微言奧義亦可云思過半矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:25bd5eeb76c5b1852f0fbf554a28d0fca681a6a1cc935a7d8ceeb353d64df058
